<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo+</title>
  <meta name="description" content="Focus stacking professionnel par carte de netteté Laplacienne" />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon192.png" />
  <link rel="icon" href="icons/icon192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="grain"></div>

  <header>
    <div class="logo">
      <span class="logo-photo">Photo</span><span class="logo-plus">+</span>
    </div>
    <div class="tagline">Focus Stacking · Laplacian Sharpness</div>
    <div class="header-info" id="headerInfo"></div>
  </header>

  <main>
    <!-- STEP 1: DROP ZONE -->
    <section class="step" id="stepDrop">
      <div class="step-label"><span class="step-num">01</span> Charger les images</div>

      <div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Zone de dépôt d'images">
        <div class="drop-inner">
          <div class="drop-icon">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="8" y="16" width="48" height="36" rx="3" stroke="currentColor" stroke-width="2"/>
              <circle cx="22" cy="28" r="4" stroke="currentColor" stroke-width="2"/>
              <path d="M8 40 L20 30 L30 38 L42 26 L56 40" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M32 8 L32 28 M26 14 L32 8 L38 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="drop-title">Déposer les images ici</div>
          <div class="drop-sub">PNG · JPEG · 2 à 20 fichiers</div>
          <label class="btn-browse" for="fileInput">
            Parcourir les fichiers
            <input type="file" id="fileInput" accept="image/png,image/jpeg" multiple hidden />
          </label>
        </div>
        <div class="drop-overlay" id="dropOverlay">Relâcher pour charger</div>
      </div>

      <div class="file-grid" id="fileGrid"></div>

      <div class="actions" id="actionsBar" style="display:none">
        <div class="file-count" id="fileCount"></div>
        <div class="action-row">
          <button class="btn-secondary" id="btnClear">Effacer tout</button>
          <div class="format-select">
            <label>Export</label>
            <div class="toggle-group">
              <button class="toggle-btn active" data-fmt="png">PNG</button>
              <button class="toggle-btn" data-fmt="jpeg">JPEG</button>
            </div>
          </div>
          <button class="btn-primary" id="btnProcess">
            <span>Lancer le stacking</span>
            <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
    </section>

    <!-- STEP 2: PROCESSING -->
    <section class="step hidden" id="stepProcess">
      <div class="step-label"><span class="step-num">02</span> Traitement en cours</div>
      <div class="process-panel">
        <div class="process-stage" id="processStage">Initialisation…</div>
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="process-detail" id="processDetail"></div>
        <div class="canvas-row" id="canvasRow">
          <div class="canvas-wrap">
            <div class="canvas-label">Alignement</div>
            <canvas id="previewAlign"></canvas>
          </div>
          <div class="canvas-wrap">
            <div class="canvas-label">Carte de netteté</div>
            <canvas id="previewMap"></canvas>
          </div>
          <div class="canvas-wrap">
            <div class="canvas-label">Résultat</div>
            <canvas id="previewResult"></canvas>
          </div>
        </div>
      </div>
    </section>

    <!-- STEP 3: RESULT -->
    <section class="step hidden" id="stepResult">
      <div class="step-label"><span class="step-num">03</span> Résultat</div>
      <div class="result-panel">
        <div class="result-image-wrap">
          <img id="resultImg" alt="Image focus-stackée" />
          <div class="result-badge" id="resultBadge"></div>
        </div>
        <div class="result-meta" id="resultMeta"></div>
        <div class="result-actions">
          <button class="btn-export" id="btnExport">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 3v13M6 10l6 6 6-6M3 19h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Télécharger
          </button>
          <button class="btn-secondary" id="btnReset">Nouvelle session</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <span>Photo+ · Focus Stacking PWA</span>
    <span>BernardHoyez.github.io/PWA/photo+</span>
  </footer>

  <!-- Hidden canvases for processing -->
  <canvas id="workCanvas" style="display:none"></canvas>

  <script src="app.js"></script>
</body>
</html>
