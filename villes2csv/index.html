<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>villes2csv</title>
  <meta name="description" content="Gestion de villes géolocalisées en CSV" />
  <meta name="theme-color" content="#1a2e4a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon192.png" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── Design tokens ─────────────────────────────────────────── */
    :root {
      --bg:        #0d1b2a;
      --surface:   #162437;
      --border:    #243650;
      --accent:    #3d8ef0;
      --accent2:   #50e3c2;
      --danger:    #e05a5a;
      --ok:        #4cdb7e;
      --text:      #dce8f5;
      --muted:     #6b8db5;
      --radius:    10px;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      overflow-x: hidden;
    }

    /* ─── Layout ─────────────────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100dvh;
    }

    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    header h1 {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.03em;
      color: var(--accent2);
      white-space: nowrap;
    }

    header h1 span { color: var(--accent); }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex: 1;
    }

    /* ─── Main split ─────────────────────────────────────────────── */
    #main {
      display: grid;
      grid-template-columns: 380px 1fr;
      overflow: hidden;
    }

    @media (max-width: 780px) {
      #main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    }

    /* ─── Sidebar ─────────────────────────────────────────────────── */
    #sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-family: var(--font-head);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ─── Inputs ─────────────────────────────────────────────────── */
    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }

    label.file-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      font-size: 13px;
      color: var(--muted);
      width: 100%;
      margin-top: 8px;
    }
    label.file-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(61,142,240,.07); }
    label.file-btn input { display: none; }

    /* ─── Buttons ─────────────────────────────────────────────────── */
    btn, .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: none;
      border-radius: var(--radius);
      padding: 8px 14px;
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(.97); }

    .btn-primary  { background: var(--accent);  color: #fff; }
    .btn-success  { background: var(--ok);       color: #0d1b2a; }
    .btn-danger   { background: var(--danger);   color: #fff; }
    .btn-ghost    { background: var(--border);   color: var(--text); }
    .btn-muted    { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn:hover    { opacity: .85; }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ─── Tile selector ──────────────────────────────────────────── */
    .tile-selector {
      display: flex;
      gap: 6px;
    }
    .tile-option {
      flex: 1;
      padding: 7px 6px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      cursor: pointer;
      transition: .2s;
    }
    .tile-option.active, .tile-option:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(61,142,240,.1);
    }

    /* ─── City list ──────────────────────────────────────────────── */
    #city-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    #city-list::-webkit-scrollbar { width: 4px; }
    #city-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .city-card {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      margin-bottom: 4px;
      transition: background .15s, border-color .15s;
      cursor: pointer;
    }
    .city-card:hover { background: rgba(255,255,255,.04); border-color: var(--border); }
    .city-card.new    { border-color: var(--accent2); background: rgba(80,227,194,.06); }
    .city-card.valid  { border-color: var(--ok);     background: rgba(76,219,126,.05); }
    .city-card.invalid{ border-color: var(--danger); background: rgba(224,90,90,.05); }

    .city-name {
      font-family: var(--font-head);
      font-size: 0.88rem;
      font-weight: 600;
    }
    .city-coords {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }
    .city-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .badge-new     { background: var(--accent2); color: #0d1b2a; }
    .badge-valid   { background: var(--ok);      color: #0d1b2a; }
    .badge-invalid { background: var(--danger);  color: #fff; }
    .badge-pending { background: var(--border);  color: var(--muted); }

    .city-actions { display: flex; gap: 4px; }
    .icon-btn {
      width: 28px; height: 28px;
      border: none; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: .15s; font-size: 14px;
      background: transparent;
    }
    .icon-btn:hover { background: var(--border); }
    .icon-btn.ok    { color: var(--ok); }
    .icon-btn.no    { color: var(--danger); }
    .icon-btn.del   { color: var(--muted); }

    /* ─── Footer buttons ─────────────────────────────────────────── */
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    /* ─── Map ────────────────────────────────────────────────────── */
    #map {
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ─── Status bar ─────────────────────────────────────────────── */
    #status {
      position: fixed;
      bottom: 14px;
      right: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 14px;
      font-size: 12px;
      color: var(--muted);
      z-index: 9999;
      max-width: 320px;
      transition: opacity .3s;
      pointer-events: none;
    }
    #status.hidden { opacity: 0; }
    #status.ok  { color: var(--ok);    border-color: var(--ok); }
    #status.err { color: var(--danger);border-color: var(--danger); }

    /* ─── Loading overlay ────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: rgba(13,27,42,.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000;
      backdrop-filter: blur(3px);
      transition: opacity .2s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Leaflet label ──────────────────────────────────────────── */
    .leaflet-tooltip-city {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      font-family: var(--font-mono) !important;
      font-size: 11px !important;
      padding: 3px 7px !important;
      border-radius: 5px !important;
      box-shadow: 0 2px 8px rgba(0,0,0,.4) !important;
      white-space: nowrap;
    }
    .tooltip-new     { border-color: var(--accent2) !important; color: var(--accent2) !important; }
    .tooltip-valid   { border-color: var(--ok)     !important; color: var(--ok)      !important; }
    .tooltip-invalid { border-color: var(--danger) !important; color: var(--danger)  !important; }

    /* ─── Nominatim result picker ────────────────────────────────── */
    #picker-overlay {
      position: fixed; inset: 0;
      background: rgba(13,27,42,.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 10001;
      backdrop-filter: blur(4px);
    }
    #picker-overlay.hidden { display: none; }
    #picker-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: min(94vw, 520px);
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px;
    }
    #picker-box h2 {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--accent2);
    }
    .picker-item {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 8px;
      cursor: pointer;
      transition: .15s;
    }
    .picker-item:hover { border-color: var(--accent); background: rgba(61,142,240,.08); }
    .picker-item strong { font-family: var(--font-head); font-size: .87rem; display: block; margin-bottom: 3px; }
    .picker-item small  { color: var(--muted); font-size: 11px; }
    .picker-cancel {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
    }
    #csv-filename {
      font-size: 11px;
      color: var(--accent2);
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <h1>villes<span>2</span>csv</h1>
    <div class="header-controls">
      <span id="csv-count" style="color:var(--muted);font-size:12px;">Aucun fichier chargé</span>
    </div>
  </header>

  <!-- MAIN -->
  <div id="main">

    <!-- SIDEBAR -->
    <aside id="sidebar">

      <!-- Charger CSV -->
      <div class="panel">
        <div class="panel-title">① Charger un CSV existant</div>
        <label class="file-btn">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          Choisir un fichier .csv
          <input type="file" id="csv-input" accept=".csv" />
        </label>
        <div id="csv-filename"></div>
      </div>

      <!-- Nouvelle ville -->
      <div class="panel">
        <div class="panel-title">② Ajouter une ville</div>
        <div class="input-row">
          <input type="text" id="city-input" placeholder="Nom de la ville…" />
          <button class="btn btn-primary" id="search-btn" title="Rechercher">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          </button>
        </div>
      </div>

      <!-- Fond de carte -->
      <div class="panel">
        <div class="panel-title">③ Fond de carte</div>
        <div class="tile-selector">
          <div class="tile-option active" data-tile="osm">OSM</div>
          <div class="tile-option" data-tile="ign">IGN Plan V2</div>
        </div>
      </div>

      <!-- Liste des villes -->
      <div class="panel-title" style="padding:12px 16px 4px;color:var(--muted);">④ Villes</div>
      <div id="city-list"></div>

      <!-- Footer -->
      <div class="sidebar-footer" style="flex-direction:column;gap:8px;">
        <div style="display:flex;gap:8px;">
          <button class="btn btn-success" id="save-btn" style="flex:1" disabled>
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Sauvegarder CSV
          </button>
          <button class="btn btn-ghost" id="clear-btn" title="Tout effacer">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
        <div style="font-size:10px;color:var(--muted);line-height:1.5;padding:0 2px;">
          <svg style="vertical-align:middle;margin-right:3px" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          QGIS — étiquettes des villes&nbsp;:
          <span style="color:var(--text);">Propriétés de la couche › Étiquettes › Étiquette simple</span>
        </div>
      </div>
    </aside>

    <!-- MAP -->
    <div id="map"></div>
  </div>
</div>

<!-- Loading -->
<div id="loading" class="hidden"><div class="spinner"></div></div>

<!-- Status -->
<div id="status" class="hidden"></div>

<!-- Picker modal -->
<div id="picker-overlay" class="hidden">
  <div id="picker-box">
    <h2>Sélectionner un résultat</h2>
    <div id="picker-results"></div>
    <button class="btn btn-ghost picker-cancel" id="picker-cancel">Annuler</button>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
