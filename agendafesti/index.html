<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaFesti</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4CAF50">
</head>
<body>
    <header>
        <h1>🎉 AgendaFesti</h1>
        
        <div class="filters-container">
            <div class="filter-group">
                <label for="range-distance">📍 Rayon : <span id="val-distance">25</span> km</label>
                <input type="range" id="range-distance" min="1" max="40" value="25">
            </div>
            <div class="filter-group">
                <label for="range-delai">📅 Horizon : <span id="val-delai">15</span> jours</label>
                <input type="range" id="range-delai" min="1" max="20" value="15">
            </div>
        </div>

        <button id="geo-btn">📍 Ajuster & Actualiser</button>
        <div id="status">Initialisation...</div>
    </header>

    <main id="events-container">
        </main>

    <script src="./app.js"></script>
</body>
</html>
