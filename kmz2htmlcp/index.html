<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>kmz2htmlcp – Visualisation de randonnée</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b3d91" />

  <!-- Manifest PWA -->
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- Icônes PWA (placeholders) -->
  <link rel="icon" sizes="192x192" href="icon192.png" />
  <link rel="icon" sizes="512x512" href="icon512.png" />

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- Simple parser KML -> GeoJSON (tokml/omnivore seraient possibles, ici parser maison simplifié) -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    header {
      padding: 0.5rem 1rem;
      background: #0b3d91;
      color: #fff;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    header h1 {
      font-size: 1rem;
      margin: 0;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
    }
    .buttons button,
    .buttons a {
      border: none;
      padding: 0.35rem 0.6rem;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      background: #fff;
      color: #0b3d91;
      text-decoration: none;
      font-weight: 500;
    }
    .buttons button:hover,
    .buttons a:hover {
      background: #e0e7ff;
    }
    #map {
      flex: 1;
      width: 100%;
    }

    /* Popup responsive */
    .wp-popup {
      max-width: 260px;
    }
    .wp-popup h3 {
      margin: 0 0 0.25rem 0;
      font-size: 1rem;
    }
    .wp-popup img {
      width: 100%;
      height: auto;
      border-radius: 4px;
      margin-bottom: 0.25rem;
    }
    .wp-popup .meta {
      font-size: 0.75rem;
      color: #555;
      margin-top: 0.25rem;
    }
    .wp-popup .comment {
      font-size: 0.8rem;
      margin-top: 0.25rem;
    }
    .wp-popup .actions {
      margin-top: 0.35rem;
      text-align: right;
    }
    .wp-popup .actions button {
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      border: none;
      background: #0b3d91;
      color: #fff;
      cursor: pointer;
    }

    /* Sur écran large, popup un peu plus large */
    @media (min-width: 768px) {
      .wp-popup {
        max-width: 360px;
      }
    }

    /* Modal pour agrandissement photo */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .modal-backdrop.active {
      display: flex;
    }
    .modal-content {
      max-width: 95vw;
      max-height: 95vh;
    }
    .modal-content img {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>kmz2htmlcp – Tracé de randonnée</h1>
      <div class="buttons">
        <a id="btn-kml" href="#" download> KML </a>
        <a id="btn-gpx" href="#" download> GPX </a>
        <a id="btn-json" href="#" download> JSON </a>
        <a id="btn-pdf" href="#" download> PDF </a>
        <button id="btn-print">Imprimer</button>
      </div>
    </header>
    <div id="map"></div>
  </div>

  <!-- Modal agrandissement photo -->
  <div id="photo-modal" class="modal-backdrop" role="dialog" aria-modal="true">
    <div class="modal-content">
      <img id="photo-modal-img" src="" alt="Photo du waypoint" />
    </div>
  </div>

  <script>
    // --- Utilitaires ---

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    // Chemin du dossier de randonnée, ex: /PWA/kmz-photos/ma-rando
    const hikePath = getQueryParam("path") || "."; // par défaut, même dossier

    // Fichiers d'export supposés présents dans le dossier de randonnée
    const kmlFile = hikePath + "/doc.kml";
    const gpxFile = hikePath + "/doc.gpx";
    const jsonFile = hikePath + "/doc.json";
    const pdfFile = hikePath + "/doc.pdf";

    // Configure les liens de téléchargement
    document.getElementById("btn-kml").href = kmlFile;
    document.getElementById("btn-gpx").href = gpxFile;
    document.getElementById("btn-json").href = jsonFile;
    document.getElementById("btn-pdf").href = pdfFile;

    document.getElementById("btn-kml").download = "trace.kml";
    document.getElementById("btn-gpx").download = "trace.gpx";
    document.getElementById("btn-json").download = "trace.json";
    document.getElementById("btn-pdf").download = "trace.pdf";

    // Impression
    document.getElementById("btn-print").addEventListener("click", () => {
      window.print();
    });

    // Modal agrandissement photo
    const modal = document.getElementById("photo-modal");
    const modalImg = document.getElementById("photo-modal-img");
    modal.addEventListener("click", () => {
      modal.classList.remove("active");
      modalImg.src = "";
    });

    function openPhotoModal(src) {
      modalImg.src = src;
      modal.classList.add("active");
    }

    // --- Initialisation Leaflet ---

    const map = L.map("map");

    // Fond OSM
    const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
    }).addTo(map);

    // Placeholders pour IGN Plan V2 et BdOrtho via géoplateforme publique
    // À adapter avec les bonnes URL WMTS/XYZ et éventuellement une clé si nécessaire.
    const ignPlan = L.tileLayer(
      "https://wxs.ign.fr/essentiels/geoportail/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=GEOGRAPHICALGRIDSYSTEMS.PLANIGNV2&STYLE=normal&FORMAT=image/png&TILEMATRIXSET=PM&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}",
      {
        maxZoom: 19,
        attribution: '&copy; IGN - Plan V2'
      }
    );

    const ignOrtho = L.tileLayer(
      "https://wxs.ign.fr/essentiels/geoportail/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=ORTHOIMAGERY.ORTHOPHOTOS&STYLE=normal&FORMAT=image/jpeg&TILEMATRIXSET=PM&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}",
      {
        maxZoom: 19,
        attribution: '&copy; IGN - BdOrtho'
      }
    );

    const baseLayers = {
      "OSM": osm,
      "IGN Plan V2": ignPlan,
      "IGN BdOrtho": ignOrtho
    };

    L.control.layers(baseLayers, null, { position: "topright" }).addTo(map);

    // --- Chargement et parsing simplifié de doc.kml ---

    async function loadKml() {
      try {
        const res = await fetch(kmlFile);
        if (!res.ok) {
          console.error("Impossible de charger le KML", res.status);
          return;
        }
        const text = await res.text();
        const parser = new DOMParser();
        const xml = parser.parseFromString(text, "application/xml");

        const placemarks = Array.from(xml.getElementsByTagName("Placemark"));

        const trackCoords = [];
        const waypointMarkers = [];

        placemarks.forEach(pm => {
          const nameEl = pm.getElementsByTagName("name")[0];
          const name = nameEl ? nameEl.textContent.trim() : "Waypoint";

          const lineString = pm.getElementsByTagName("LineString")[0];
          const point = pm.getElementsByTagName("Point")[0];

          // ExtendedData pour infos supplémentaires (commentaire, photo, altitude, etc.)
          const extended = pm.getElementsByTagName("ExtendedData")[0];
          const data = {};
          if (extended) {
            const datas = extended.getElementsByTagName("Data");
            Array.from(datas).forEach(d => {
              const key = d.getAttribute("name");
              const valueEl = d.getElementsByTagName("value")[0];
              if (key && valueEl) {
                data[key] = valueEl.textContent;
              }
            });
          }

          if (lineString) {
            const coordsEl = lineString.getElementsByTagName("coordinates")[0];
            if (coordsEl) {
              const coordsText = coordsEl.textContent.trim();
              coordsText.split(/\s+/).forEach(c => {
                const [lon, lat, alt] = c.split(",").map(Number);
                if (!isNaN(lat) && !isNaN(lon)) {
                  trackCoords.push([lat, lon]);
                }
              });
            }
          }

          if (point) {
            const coordsEl = point.getElementsByTagName("coordinates")[0];
            if (coordsEl) {
              const [lon, lat, alt] = coordsEl.textContent.trim().split(",").map(Number);
              if (!isNaN(lat) && !isNaN(lon)) {
                const photoFile = data["photo"] || data["image"] || null; // clé à adapter à ton KML
                const commentHtml = data["comment"] || data["description"] || "";
                const altitude = data["altitude"] || (alt != null ? alt.toFixed(0) : "");
                const latStr = lat.toFixed(6);
                const lonStr = lon.toFixed(6);

                const photoUrl = photoFile ? (hikePath + "/photos/" + photoFile) : null;

                const popupDiv = document.createElement("div");
                popupDiv.className = "wp-popup";

                const titleEl = document.createElement("h3");
                titleEl.textContent = name;
                popupDiv.appendChild(titleEl);

                if (photoUrl) {
                  const img = document.createElement("img");
                  img.src = photoUrl;
                  img.alt = name;
                  popupDiv.appendChild(img);
                }

                const commentDiv = document.createElement("div");
                commentDiv.className = "comment";
                commentDiv.innerHTML = commentHtml; // déjà en HTML (max 500 caractères)
                popupDiv.appendChild(commentDiv);

                const metaDiv = document.createElement("div");
                metaDiv.className = "meta";
                metaDiv.textContent =
                  "Alt : " + (altitude || "?") + " m – " +
                  "Lat : " + latStr + " / Lon : " + lonStr;
                popupDiv.appendChild(metaDiv);

                if (photoUrl) {
                  const actionsDiv = document.createElement("div");
                  actionsDiv.className = "actions";
                  const btn = document.createElement("button");
                  btn.textContent = "Agrandir";
                  btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    openPhotoModal(photoUrl);
                  });
                  actionsDiv.appendChild(btn);
                  popupDiv.appendChild(actionsDiv);
                }

                const marker = L.marker([lat, lon]).bindPopup(popupDiv);
                waypointMarkers.push(marker);
              }
            }
          }
        });

        let bounds = null;

        if (trackCoords.length > 0) {
          const polyline = L.polyline(trackCoords, {
            color: "#d62828",
            weight: 4
          }).addTo(map);
          bounds = polyline.getBounds();
        }

        if (waypointMarkers.length > 0) {
          const group = L.featureGroup(waypointMarkers).addTo(map);
          if (bounds) {
            bounds = bounds.extend(group.getBounds());
          } else {
            bounds = group.getBounds();
          }
        }

        if (bounds) {
          map.fitBounds(bounds, { padding: [20, 20] });
        } else {
          map.setView([46.5, 2.5], 6); // fallback France
        }
      } catch (err) {
        console.error("Erreur lors du chargement du KML :", err);
        map.setView([46.5, 2.5], 6);
      }
    }

    loadKml();

    // --- Enregistrement du service worker ---

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("./sw.js")
          .catch(err => console.error("SW registration failed:", err));
      });
    }
  </script>
</body>
</html>
