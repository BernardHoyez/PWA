<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mytrek - Éditeur PWA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e4620">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --brand-color: #1e4620;
            --sidebar-width: 420px;
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex; height: 100vh; overflow: hidden;
            background: #f3f4f6;
        }
        
        /* Panneau de configuration (Gauche) */
        #sidebar {
            width: var(--sidebar-width);
            background: #ffffff;
            box-shadow: 4px 0 15px rgba(0,0,0,0.08);
            display: flex; flex-direction: column; z-index: 1000;
        }
        .header-box { 
            padding: 20px; 
            background: var(--brand-color); 
            color: white;
        }
        .header-box h1 { margin: 0 0 12px 0; font-size: 1.6em; font-weight: 700; letter-spacing: -0.5px; }
        
        .content-box { padding: 20px; flex: 1; overflow-y: auto; }
        
        /* Section commune de départ */
        .section-commune {
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px; margin-bottom: 20px;
        }
        
        /* Cartes interactives des étapes (Waypoints) */
        .waypoint-card {
            background: white; border: 1px solid #e2e8f0; border-radius: 8px;
            padding: 14px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .waypoint-card:hover { border-color: #cbd5e1; }
        
        /* Zone de la vignette image */
        .thumb-box { 
            margin: 10px 0; padding: 10px; background: #f8fafc; border-radius: 6px;
            display: flex; align-items: center; gap: 12px; border: 1px dashed #cbd5e1;
        }
        .thumb-box img { 
            width: 75px; height: 75px; border-radius: 6px; object-fit: cover; 
            background: #e2e8f0; border: 1px solid #e2e8f0;
        }
        .thumb-text { font-size: 0.8em; color: #64748b; flex: 1; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.85em; color: #334155; font-weight: 600; margin-bottom: 5px; }
        .form-group input[type="text"], .form-group textarea {
            width: 100%; box-sizing: border-box; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px;
            font-size: 0.9em;
        }
        
        /* Zone Cartographique (Droite) */
        #map { flex: 1; height: 100%; }
        
        /* Boutons d'action */
        .btn-export {
            background: #d97706; color: white; border: none; padding: 16px;
            width: 100%; font-size: 1.1em; font-weight: bold; cursor: pointer;
            transition: background 0.2s;
        }
        .btn-export:hover { background: #b45309; }
        .btn-preview { background: #1e4620; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8em; }
        
        /* Modal d'affichage plein écran */
        #modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center;
        }
        #modal img { max-width: 85%; max-height: 85%; border: 3px white solid; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- PANNEAU CONFIGURATION -->
    <div id="sidebar">
        <div class="header-box">
            <h1>mytrek 🥾</h1>
            <input type="file" id="fileInput" accept=".kmz" style="width: 100%; color: white; font-size: 0.9em;" />
        </div>
        
        <div class="content-box">
            <!-- Saisie de la commune - Requis pour la nomenclature du package final -->
            <div class="section-commune">
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="communeStart">🏙️ Commune de départ (suffixe du dossier) :</label>
                    <input type="text" id="communeStart" placeholder="Ex: Chamonix, Cortina..." />
                </div>
            </div>
            
            <h3 style="margin: 0 0 15px 0; font-size: 1.05em; color: #1e293b; text-transform: uppercase; letter-spacing: 0.5px;">Étapes de la randonnée</h3>
            <div id="waypointsList">
                <p style="color:#64748b; text-align:center; font-style: italic; margin-top: 40px; font-size: 0.9em;">
                    Sélectionnez un fichier .kmz ci-dessus pour charger le tracé géographique et lier vos vignettes.
                </p>
            </div>
        </div>
        
        <button class="btn-export" id="btnExport">📦 Générer le Package (.ZIP)</button>
    </div>

    <!-- CARTE DE VISUALISATION -->
    <div id="map"></div>

    <!-- ZOOM VIGNETTES -->
    <div id="modal" onclick="this.style.display='none'">
        <img id="modalImg" src="" alt="Zoom">
    </div>

    <!-- DEPENDANCES DISTANTES -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        // --- A. ENREGISTREMENT DU SERVICE WORKER MYTREK ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker mytrek enregistré avec succès !', reg.scope))
                    .catch(err => console.error('Échec enregistrement SW:', err));
            });
        }

        // --- B. INSTANCIATION DE LA CARTE ---
        const map = L.map('map').setView([46.603354, 1.888334], 6);
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        const ignPlan = L.tileLayer('https://data.geopf.fr/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=GEOGRAPHICALGRIDSYSTEMS.PLANIGNV2&STYLE=normal&FORMAT=image/png&TILEMATRIXSET=PM&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}', { attribution: '© IGN' });
        const ignOrtho = L.tileLayer('https://data.geopf.fr/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=ORTHOIMAGERY.ORTHOPHOTOS&STYLE=normal&FORMAT=image/jpeg&TILEMATRIXSET=PM&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}', { attribution: '© IGN' });

        L.control.layers({ "OpenStreetMap": osm, "IGN Plan": ignPlan, "IGN Satellite": ignOrtho }).addTo(map);

        // --- C. STOCKAGE APPLICATIF ---
        let myTrekEngine = {
            originalName: "trekking",
            polylineCoords: [],
            pointsOfInterest: []
        };
        let mapGraphics = L.layerGroup().addTo(map);

        // --- D. ANALYSE ET DECOUPAGE KMZ ---
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            myTrekEngine.originalName = file.name.replace(/\.[^/.]+$/, "");
            mapGraphics.clearLayers();
            document.getElementById('waypointsList').innerHTML = "<p style='text-align:center;'>Traitement du fichier compressé...</p>";

            try {
                const zip = await JSZip.loadAsync(file);
                const internalKml = Object.keys(zip.files).find(n => n.endsWith('.kml'));
                if (!internalKml) throw new Error("Fichier de géolocalisation absent de l'archive.");

                const textData = await zip.files[internalKml].async("string");
                extractGeometries(textData);
            } catch (error) {
                console.error(error);
                alert("Erreur de décodage du fichier KMZ.");
                document.getElementById('waypointsList').innerHTML = "<p style='color:red;'>Erreur technique.</p>";
            }
        });

        function extractGeometries(xmlText) {
            const domParser = new DOMParser();
            const xmlDoc = domParser.parseFromString(xmlText, "text/xml");
            
            myTrekEngine.pointsOfInterest = [];
            myTrekEngine.polylineCoords = [];
            
            const placemarks = xmlDoc.getElementsByTagName("Placemark");
            const sideList = document.getElementById('waypointsList');
            sideList.innerHTML = "";
            
            let counter = 0;

            for (let pm of placemarks) {
                const title = pm.getElementsByTagName("name")[0]?.textContent || `Étape ${counter + 1}`;
                
                // Extraction de la trace cartographique
                const lineNode = pm.getElementsByTagName("LineString")[0];
                if (lineNode) {
                    const rawText = lineNode.getElementsByTagName("coordinates")[0]?.textContent || "";
                    const cleaned = parseCoordinates(rawText);
                    if (cleaned.length > 0) {
                        myTrekEngine.polylineCoords = cleaned;
                        const lineGraphic = L.polyline(cleaned, {color: '#d97706', weight: 5, opacity: 0.9}).addTo(mapGraphics);
                        map.fitBounds(lineGraphic.getBounds());
                    }
                    continue;
                }

                // Extraction des marqueurs isolés (Waypoints)
                const pointNode = pm.getElementsByTagName("Point")[0];
                if (pointNode) {
                    const rawText = pointNode.getElementsByTagName("coordinates")[0]?.textContent || "";
                    const cleaned = parseCoordinates(rawText);
                    if (cleaned.length > 0) {
                        const [lat, lng, alt] = cleaned[0];
                        
                        const wpObject = {
                            id: counter,
                            name: title.substring(0, 40),
                            lat: lat, lng: lng, alt: alt,
                            note: "",
                            imageData: null
                        };
                        
                        myTrekEngine.pointsOfInterest.push(wpObject);
                        injectWaypointUiCard(wpObject);
                        
                        const marker = L.marker([lat, lng]).addTo(mapGraphics);
                        marker.bindPopup(`<b>${wpObject.name}</b>`);
                        wpObject.leafletMarker = marker;
                        
                        counter++;
                    }
                }
            }
        }

        function parseCoordinates(str) {
            return str.trim().split(/[\s\n]+/).map(row => {
                const chunks = row.split(',');
                if (chunks.length >= 2) {
                    const longitude = parseFloat(chunks[0]);
                    const latitude = parseFloat(chunks[1]);
                    const altitude = chunks[2] ? parseFloat(chunks[2]) : 0;
                    if (!isNaN(latitude) && !isNaN(longitude)) return [latitude, longitude, altitude];
                }
                return null;
            }).filter(item => item !== null);
        }

        // --- E. INTERFACE ET REASSORT DES VIGNETTES ---
        function injectWaypointUiCard(wp) {
            const sideList = document.getElementById('waypointsList');
            const card = document.createElement('div');
            card.className = 'waypoint-card';
            
            card.innerHTML = `
                <div class="form-group">
                    <label>Nom du point d'intérêt :</label>
                    <input type="text" maxlength="40" value="${wp.name}" oninput="syncName(${wp.id}, this.value)">
                </div>
                <div style="font-size:0.75em; color:#64748b; margin-bottom: 8px;">
                    🧭 Lat: ${wp.lat.toFixed(5)} | Lng: ${wp.lng.toFixed(5)} | 🏔️ ${wp.alt.toFixed(0)}m
                </div>
                <div class="form-group">
                    <label>Ajouter une vignette photo :</label>
                    <input type="file" accept="image/*" onchange="processVignette(${wp.id}, this)">
                    <div class="thumb-box" id="box-thumb-${wp.id}">
                        <div style="width:75px; height:75px; background:#f1f5f9; border-radius:6px;"></div>
                        <div class="thumb-text">Aucune vignette liée.</div>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>Notes / Informations :</label>
                    <textarea maxlength="500" rows="2" oninput="syncNote(${wp.id}, this.value)" placeholder="Détails du point de passage..."></textarea>
                </div>
            `;
            sideList.appendChild(card);
        }

        function syncName(id, val) {
            myTrekEngine.pointsOfInterest[id].name = val;
            refreshPopup(id);
        }

        function syncNote(id, val) {
            myTrekEngine.pointsOfInterest[id].note = val;
            refreshPopup(id);
        }

        function refreshPopup(id) {
            const wp = myTrekEngine.pointsOfInterest[id];
            if (!wp.leafletMarker) return;
            let html = `<div style="font-family:sans-serif;"><b>${wp.name}</b>`;
            if (wp.imageData) html += `<br><img src="${wp.imageData}" style="width:100%; max-height:100px; object-fit:cover; border-radius:4px; margin-top:5px;">`;
            if (wp.note) html += `<p style="font-size:0.85em; color:#444; margin:5px 0 0 0;">${wp.note}</p>`;
            html += `</div>`;
            wp.leafletMarker.bindPopup(html);
        }

        function processVignette(id, input) {
            const file = input.files[0];
            if (!file) return;

            const fileReader = new FileReader();
            fileReader.onload = function(e) {
                const tempImg = new Image();
                tempImg.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = tempImg.width;
                    let height = tempImg.height;

                    const MAX_BOUNDS = 1000;
                    if (width > height && width > MAX_BOUNDS) {
                        height *= MAX_BOUNDS / width; width = MAX_BOUNDS;
                    } else if (height > MAX_BOUNDS) {
                        width *= MAX_BOUNDS / height; height = MAX_BOUNDS;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(tempImg, 0, 0, width, height);

                    const compressedUrl = canvas.toDataURL("image/jpeg", 0.8);
                    myTrekEngine.pointsOfInterest[id].imageData = compressedUrl;

                    const targetBox = document.getElementById(`box-thumb-${id}`);
                    targetBox.innerHTML = `
                        <img src="${compressedUrl}">
                        <div class="thumb-text">
                            <span style="color:#1e4620; font-weight:bold;">Vignette rattachée</span><br>
                            <button type="button" class="btn-preview" style="margin-top:4px;" onclick="viewFull('${compressedUrl}')">Agrandir</button>
                        </div>
                    `;
                    refreshPopup(id);
                };
                tempImg.src = e.target.result;
            };
            fileReader.readAsDataURL(file);
        }

        function viewFull(url) {
            document.getElementById('modalImg').src = url;
            document.getElementById('modal').style.display = 'flex';
        }

        // --- F. COMPILATION DU ZIP STRUCTURE AVEC DOSSIER ---
        document.getElementById('btnExport').addEventListener('click', async () => {
            if (myTrekEngine.polylineCoords.length === 0 && myTrekEngine.pointsOfInterest.length === 0) {
                alert("Données vides. Veuillez d'abord charger un fichier .kmz.");
                return;
            }

            const commune = document.getElementById('communeStart').value.trim();
            if (!commune) {
                alert("Veuillez renseigner la commune de départ pour structurer le dossier d'export.");
                document.getElementById('communeStart').focus();
                return;
            }

            const cleanCommuneName = commune.replace(/[^a-zA-Z0-9]/g, "_");
            const finalPackageName = `${myTrekEngine.originalName}-${cleanCommuneName}`;
            
            const zipArchiver = new JSZip();
            const root = zipArchiver.folder(finalPackageName);
            const subPhotos = root.folder("photos");

            // Rangement des images converties en binaire pur
            myTrekEngine.pointsOfInterest.forEach(wp => {
                if (wp.imageData) {
                    const dataSplitted = wp.imageData.split(',');
                    const binaryString = window.atob(dataSplitted[1]);
                    const bLen = binaryString.length;
                    const bytes = new Uint8Array(bLen);
                    for (let i = 0; i < bLen; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    subPhotos.file(`wp_${wp.id}.jpg`, bytes);
                }
            });

            // Génération des livrables
            root.file(`${finalPackageName}.kml`, compileKmlString());
            root.file(`index.html`, compileHtmlViewerString(finalPackageName));

            const archiveBlob = await zipArchiver.generateAsync({type: "blob"});
            const downloadTrigger = document.createElement('a');
            downloadTrigger.href = URL.createObjectURL(archiveBlob);
            downloadTrigger.download = `${finalPackageName}.zip`;
            downloadTrigger.click();
        });

        function compileKmlString() {
            let k = `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n<Document>\n`;
            k += `  <name>${myTrekEngine.originalName}</name>\n`;
            
            if (myTrekEngine.polylineCoords.length > 0) {
                k += `  <Placemark>\n    <name>Tracé Randonnée</name>\n    <LineString>\n      <coordinates>\n`;
                myTrekEngine.polylineCoords.forEach(p => { k += `        ${p[1]},${p[0]},${p[2]}\n`; });
                k += `      </coordinates>\n    </LineString>\n  </Placemark>\n`;
            }

            myTrekEngine.pointsOfInterest.forEach(wp => {
                const hasImg = wp.imageData !== null;
                k += `  <Placemark>\n`;
                k += `    <name>${wp.name}</name>\n`;
                k += `    <description><![CDATA[
                    <div style="font-family:sans-serif; width:260px; padding:2px;">
                        <h3 style="margin:0 0 5px 0; color:#1e4620;">${wp.name}</h3>
                        ${hasImg ? `<img src="photos/wp_${wp.id}.jpg" style="width:100%; border-radius:4px; max-height:160px; object-fit:cover; margin-bottom:5px;">` : ''}
                        <p style="font-size:0.8em; color:#666; margin:2px 0;">Altitude : ${wp.alt.toFixed(0)} m</p>
                        <p style="margin:5px 0; font-size:0.9em; color:#333;">${wp.note || '<i>Aucune note.</i>'}</p>
                    </div>
                ]]></description>\n`;
                k += `    <Point>\n      <coordinates>${wp.lng},${wp.lat},${wp.alt}</coordinates>\n    </Point>\n`;
                k += `  </Placemark>\n`;
            });

            k += `</Document>\n</kml>`;
            return k;
        }

        function compileHtmlViewerString(fName) {
            return `<!DOCTYPE html>
<html>
<head>
    <title>Visualisation - ${fName}</title>
    <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; display:flex; flex-direction:column; height:100vh; font-family:sans-serif; }
        #map { flex: 1; width:100%; }
        #topbar { background:#1e4620; padding:12px; display:flex; gap:10px; justify-content:center; }
        button { background:white; border:none; padding:8px 16px; font-weight:bold; cursor:pointer; border-radius:4px; }
    </style>
</head>
<body>
    <div id="topbar">
        <button onclick="window.print()">🖨️ Imprimer la fiche</button>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>
    <script>
        const map = L.map('map').setView([46.5, 2.4], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        console.log("Fichier source lié : ${fName}.kml");
    <\/script>
</body>
</html>`;
        }
    </script>
</body>
</html>
