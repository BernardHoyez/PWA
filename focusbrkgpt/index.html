<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>focusbrkgpt</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#111111">
</head>

<body>

<div class="container">

    <h1>focusbrkgpt</h1>

    <div class="card">

        <label>IP du smartphone</label>
        <input type="text" id="ip" value="192.168.1.42">

        <label>Port</label>
        <input type="number" id="port" value="8080">

        <button id="connectBtn">
            CONNECTER
        </button>

        <div id="status">
            Déconnecté
        </div>

    </div>

    <div class="card">

        <h2>Focus Bracketing</h2>

        <label>Nombre de vues</label>
        <input type="number" id="shots" value="10">

        <label>Focus départ</label>
        <input type="number" step="0.01" id="focusStart" value="0">

        <label>Pas focus</label>
        <input type="number" step="0.01" id="focusStep" value="0.15">

        <label>Délai (ms)</label>
        <input type="number" id="delayMs" value="400">

        <button id="startBtn">
            DÉMARRER
        </button>

    </div>

    <div class="card">

        <h2>Console</h2>

        <pre id="log"></pre>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
