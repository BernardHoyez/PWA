9633,43.393125,0],[5.85096,43.39316,0],[5.850968299999999,43.393195,0],[5.850975,43.3932233,0],[5.8509783,43.3932617,0],[5.8509783,43.3933,0],[5.8509833,43.3933317,0],[5.85101,43.3933583,0],[5.8510333,43.39338,0]]},"properties":{"name":"doc","styleUrl":"#traceStyle","styleHash":"3b936eaa","stroke":"#b400b4","stroke-opacity":1,"stroke-width":3,"fill-opacity":0}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852551388888888,43.382938333333335,0]},"properties":{"name":"Alisier blanc","description":"\u003cimg src=\"files/Alisier blanc Sorbus aria.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eAlisier blanc\u003c/h3\u003e\n\u003cp\u003eL\'Alisier blanc (Sorbus aria) est un arbre forestier remarquable par son contraste visuel. Au printemps, le revers de ses feuilles ovales et dentées est recouvert d\'un duvet blanc et cotonneux, qui miroite magnifiquement sous le vent. En automne, il produit des grappes de petits fruits rouges charnus, les alises. Très rustique, il aime le calcaire et la lumière. Son bois, dense et précieux, est recherché en ébénisterie et en lutherie.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.855334999999999,43.37215138888889,0]},"properties":{"name":"Alisier torminal","description":"\u003cimg src=\"files/Alisier torminal Sorbus torminalis.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eAlisier torminal\u003c/h3\u003e\n\u003cp\u003eL\'Alisier torminal (Sorbus torminalis) se distingue par ses feuilles découpées en lobes aigus, qui rappellent celles du platane ou de l\'érable, et qui virent au rouge flamboyant en automne. Ses petits fruits marrons et mouchetés, les alises, étaient autrefois utilisés pour soigner les coliques (les tormines). Cet arbre discret aime les sols riches et la lumière. Son bois, l\'un des plus denses d\'Europe, est une rareté précieuse en lutherie.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.856613055555555,43.37083972222222,0]},"properties":{"name":"Amazone","description":"\u003cimg src=\"files/Amazone.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eAmazone\u003c/h3\u003e\n\u003cp\u003eDans la mythologie grecque, les Amazones forment un peuple de femmes guerrières intrépides, vivant en marge du monde connu. Excellentes cavalières et archères hors pair, elles vouent leur culte à Artémis et Arès. La légende raconte qu\'elles se privaient du sein droit pour mieux tirer à l\'arc. Souvent opposées aux plus grands héros grecs comme Hercule ou Achille lors d\'affrontements épiques, elles incarnent le courage et l\'insoumission absolue.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852893055555556,43.38267666666667,0]},"properties":{"name":"Capillaire des murailles","description":"\u003cimg src=\"files/Capillaire des murailles Asplenium trichomanes.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eCapillaire des murailles\u003c/h3\u003e\n\u003cp\u003eLa Capillaire des murailles (Asplenium trichomanes) est une petite fougère vivace qui pousse dans les fissures des vieux murs, des rochers et des falaises calcaires. Elle se reconnaît facilement à ses frondes allongées, composées de petites feuilles rondes et opposées, portées par une tige rigide d\'un brun noir brillant. Très résistante, elle tolère la sécheresse en se recroquevillant, pour reverdir à la moindre pluie.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.853894722222222,43.38213666666667,0]},"properties":{"name":"Chardon litigieux","description":"\u003cimg src=\"files/Chardon litigieux Carduus litigiosum.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eChardon litigieux\u003c/h3\u003e\n\u003cp\u003eLe Chardon litigieux (Carduus crispus), ou chardon crêpu, se distingue par ses tiges dressées, fortement ailées et couvertes d\'épines molles. Ses feuilles, vertes sur le dessus et blanchâtres-cotonneuses en dessous, ont des bords ondulés. En été, il déploie des capitules de fleurs pourpres groupés au sommet des branches. Aimant les sols riches et humides, les friches et les bords de chemins, il est souvent confondu avec le chardon penché.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852519999999999,43.38240305555556,0]},"properties":{"name":"Citerne du castrum","description":"\u003cimg src=\"files/Citerne.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eCiterne du castrum\u003c/h3\u003e\n\u003cp\u003eElle est recouverte d\'un enduit étanche au mortier de tuileau, technique romaine héritée.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.837841388888888,43.38646166666667,0]},"properties":{"name":"Coronille naine","description":"\u003cimg src=\"files/Coronille naine Coronilla minima.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eCoronille naine\u003c/h3\u003e\n\u003cp\u003eLa Coronille naine (Coronilla minima) est un sous-arbrisseau méditerranéen et montagnard de la famille des Fabacées. Haute de 10 à 30 cm, elle forme de petites touffes au feuillage persistant, bleuté et charnu. Au printemps, elle déploie des couronnes de fleurs d\'un jaune vif et parfumées, rappelant des papillons. Adaptée à la sécheresse, elle s\'épanouit dans les pelouses sèches, les rocailles et les sols calcaires très ensoleillés.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.851305,43.389541666666666,0]},"properties":{"name":"Castrum de Rougiers","description":"\u003cimg src=\"files/Croix.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eCastrum de Rougiers\u003c/h3\u003e\n\u003cp\u003eLe Castrum de Rougiers est un site archéologique majeur du Moyen Âge en Provence. Perché sur un éperon rocheux, ce village fortifié des XIIe et XIIIe siècles comprend un château seigneurial, une chapelle et un bourg déserté. Fouillé minutieusement par Gabrielle Démians d\'Archimbaud, il est devenu une référence européenne pour comprendre l\'habitat rural médiéval, l\'organisation sociale et le quotidien des populations paysannes d\'alors.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852828333333333,43.382423055555556,0]},"properties":{"name":"Céphalanthère rouge","description":"\u003cimg src=\"files/Céphalanthère rouge Cephalanthera rubra.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eCéphalanthère rouge\u003c/h3\u003e\n\u003cp\u003eLa Céphalanthère rouge (Cephalanthera rubra) est une orchidée sauvage des forêts claires, des lisières et des sols calcaires. Elle se distingue par sa tige élancée et ses grandes fleurs d\'un rose vif à violacé, dont le labelle pointu est marqué de lignes blanches. Contrairement à d\'autres orchidées, ses fleurs s\'ouvrent largement pour attirer les insectes. Rare et protégée dans plusieurs régions, elle fleurit de mai à juillet.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.855964722222222,43.37727833333334,0]},"properties":{"name":"Piste DFCI","description":"\u003cimg src=\"files/DFCI de Cambon.jpg\" width=\"400\"/\u003e\n\u003ch3\u003ePiste DFCI\u003c/h3\u003e\n\u003cp\u003eLa piste DFCI de Cambon à Rougiers (Var) est une voie de Défense des Forêts Contre les Incendies essentielle à la sécurité du massif de la Sainte-Baume. Cet axe empierré permet la circulation rapide des pompiers et sert de zone coupe-feu. Traversant des paysages de garrigue et de forêts, elle croise l\'histoire locale près du castrum médiéval. Elle fait l\'objet de débroussaillement et d\'entretien régulier pour protéger la biodiversité.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852286666666666,43.382218333333334,0]},"properties":{"name":"Donjon du château","description":"\u003cimg src=\"files/Donjon du château.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eDonjon du château\u003c/h3\u003e\n\u003cp\u003eLe donjon du château de Rougiers, dressé au sommet du castrum médiéval (Var), était le symbole du pouvoir seigneurial. Cette tour maîtresse rectangulaire, construite aux XIIe et XIIIe siècles, servait de poste de guet stratégique dominant la vallée, mais aussi de dernier refuge en cas d\'attaque. Aujourd\'hui en ruine, ses imposants pans de murs en pierres de taille témoignent encore de la puissance architecturale et militaire de la Provence médiévale.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852173333333333,43.38223333333333,0]},"properties":{"name":"Erable de Montpellier","description":"\u003cimg src=\"files/Erable de Montpellier Acer monspessulanum.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eErable de Montpellier\u003c/h3\u003e\n\u003cp\u003eL\'Érable de Montpellier (Acer monspessulanum) est un petit arbre emblématique des garrigues et des forêts sèches méditerranéennes. Il se reconnaît immédiatement à ses petites feuilles cirées, dures et découpées en trois lobes arrondis et égaux (trilobées). En automne, son feuillage prend une somptueuse teinte jaune d\'or à rouge flamboyant. Très résistant à la sécheresse et au calcaire, son bois dur et dense est apprécié en tournage.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.849597222222222,43.392309166666664,0]},"properties":{"name":"Fenêtre remarquable","description":"\u003cimg src=\"files/Fenêtre à Rougiers.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eFenêtre remarquable\u003c/h3\u003e\n\u003cp\u003eAu cœur du vieux village de Rougiers (Var) se cache une fenêtre sculptée remarquable du XVIe siècle, joyau de la Renaissance locale. Ornant la façade d\'une ancienne demeure bourgeoise, cette baie à meneau se distingue par la finesse de ses décors de style gothique flamboyant tardif et Renaissance. Ses moulures intriquées, ses motifs floraux et ses détails sculptés témoignent de la richesse passée de ses propriétaires et du savoir-faire des artisans de l\'époque.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.860189999999999,43.37008138888889,0]},"properties":{"name":"Fontaine de la Guillandière","description":"\u003cimg src=\"files/Fontaine de la Guillandière.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eFontaine de la Guillandière\u003c/h3\u003e\n\u003cp\u003eLa fontaine de la Guillandière, située sur la commune de Rougiers (Var), est un point d\'eau historique lié au pastoralisme et à la vie rurale provençale. Alimentée par une source locale, elle servait autrefois d\'abreuvoir pour le bétail et de halte fraîcheur pour les voyageurs et les travailleurs de la terre. Intégrée dans les circuits de randonnée actuels du massif de la Sainte-Baume, elle témoigne de la gestion traditionnelle de l\'eau en milieu sec.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.851086666666666,43.392635,0]},"properties":{"name":"Fontaine de Rougiers","description":"\u003cimg src=\"files/Fontaine.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eFontaine de Rougiers\u003c/h3\u003e\n\u003cp\u003eLa fontaine de la place de Rougiers (Var) est un cœur de vie provençal orné d\'un blason sculpté au motif insolite : un poisson. Ce symbole héraldique, représentant un rouget, est un jeu de mots visuel (des armes parlantes) évoquant directement le nom du village, Rougiers. Flanquée de ses canons d\'eau, cette fontaine du XIXe siècle célèbre l\'arrivée de l\'eau publique au centre du bourg, alliant utilité quotidienne et fierté identitaire.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852954722222222,43.382405,0]},"properties":{"name":"Garance voyageuse","description":"\u003cimg src=\"files/Garance voyageuse probable Rubia peregrina.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eGarance voyageuse\u003c/h3\u003e\n\u003cp\u003eLa Garance voyageuse (Rubia peregrina) est une plante grimpante et vivace emblématique du Midi méditerranéen. Ses tiges carrées et ses feuilles persistantes, vert foncé, luisantes et coriaces, sont bordées de petits crochets rigides qui lui permettent de s\'agripper partout comme un velcro. En été, elle produit de petites fleurs jaune-verdâtre à 5 pétales pointus, suivies de baies charnues qui deviennent d\'un noir brillant à maturité.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.854103333333333,43.38138,0]},"properties":{"name":"Giliée capitée","description":"\u003cimg src=\"files/Gilie capitée Gilia capitata.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eGiliée capitée\u003c/h3\u003e\n\u003cp\u003eLa Giliée capitée (Gilia capitata) est une plante annuelle originaire d\'Amérique du Nord, appréciée dans les jardins pour sa légèreté. Elle se distingue par ses tiges fines portant des feuilles très découpées, presque plumeuses. De juin à août, elle offre une multitude de petites fleurs bleu lavande réunies en têtes sphériques et denses, évoquant des pompons. Très mellifère, elle attire les pollinisateurs et s\'épanouit au soleil en sol drainé.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852783333333333,43.382598055555555,0]},"properties":{"name":"Grotte","description":"\u003cimg src=\"files/Grotte.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eGrotte\u003c/h3\u003e\n\u003cp\u003eLes grottes karstiques naissent de la dissolution de roches solubles, principalement le calcaire, par des eaux de pluie chargées en CO2. Ce lent travail chimique, combiné à l\'érosion mécanique, crée de vastes réseaux souterrains. Au fil des millénaires, l\'eau y dépose du carbonate de calcium, sculptant de spectaculaires concrétions : stalactites, stalagmites, draperies et colonnes. Ces cavités abritent des écosystèmes uniques et fragiles.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.8609913888888885,43.36926833333333,0]},"properties":{"name":"Géranium sanguin","description":"\u003cimg src=\"files/Géranium sanguin Geranium sanguineum.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eGéranium sanguin\u003c/h3\u003e\n\u003cp\u003eLe Géranium sanguin (Geranium sanguineum) est une plante vivace sauvage des lisières, clairières et rocailles calcaires. Il forme de denses coussins de feuilles finement découpées qui virent au rouge flamboyant à l\'automne. De mai à octobre, il se couvre d\'une multitude de grandes fleurs d\'un rose violacé intense à cinq pétales.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.8527466666666665,43.38274166666667,0]},"properties":{"name":"Habitat troglodyte","description":"\u003cimg src=\"files/Habitat troglodyte 2.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eHabitat troglodyte\u003c/h3\u003e\n\u003cp\u003eL\'habitat troglodyte du castrum de Rougiers (Var) illustre l\'adaptation ingénieuse des populations médiévales à leur environnement. En contrebas du château, les habitants ont profité des baumes et des cavités naturelles de la roche calcaire pour y aménager des demeures, des remises ou des bergeries. Complétées par des murs de façade en pierre sèche, ces cavités offraient une protection thermique idéale et une défense naturelle contre les assauts.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852551388888888,43.382938333333335,0]},"properties":{"name":"Castrum habitat","description":"\u003cimg src=\"files/Habitat troglodyte 3.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eCastrum habitat\u003c/h3\u003e\n\u003cp\u003eLe castrum de Rougiers (Var) est mentionné dès le XIe siècle. Ce village fortifié perché, symbole de l\'« encastellement » provençal, s\'est développé sous l\'autorité des vicomtes de Marseille. Il comptait un château, une église et de nombreuses habitations. Le site est progressivement déserté au XVe siècle au profit de la plaine, plus accessible. Les fouilles majeures de G. Démians d\'Archimbaud en ont fait un modèle de l\'archéologie médiévale européenne.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852908055555555,43.38262638888889,0]},"properties":{"name":"Habitat troglodyte","description":"\u003cimg src=\"files/Habitat troglodyte.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eHabitat troglodyte\u003c/h3\u003e\n\u003cp\u003eLes fouilles du castrum de Rougiers (Var), menées par Gabrielle Démians d\'Archimbaud entre 1961 et 1970, sont une référence majeure de l\'archéologie médiévale européenne. Ce chantier pionnier a permis de mettre au jour l\'organisation complète d\'un village perché abandonné au XVe siècle : son château, son église, ses maisons de pierre et son mobilier quotidien. Ces recherches ont transformé notre compréhension de la vie rurale au Moyen Âge.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.853064722222222,43.38220805555556,0]},"properties":{"name":"Hélianthème","description":"\u003cimg src=\"files/Hélianthème sp.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eHélianthème\u003c/h3\u003e\n\u003cp\u003eLes hélianthèmes (Helianthemum) sont de petits sous-arbrisseaux tapissants, rois des rocailles et des garrigues ensoleillées. Leur nom grec, « fleur de soleil », évoque leur floraison généreuse de mai à juillet. Leurs fleurs éphémères à cinq pétales froissés (jaunes, blancs ou roses) s\'ouvrent le matin pour tomber l\'après-midi. Très robustes et résistants à la sécheresse, ils s\'épanouissent dans les sols pauvres, caillouteux et bien drainés.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.83247,43.367069722222226,0]},"properties":{"name":"Lin de Narbonne","description":"\u003cimg src=\"files/Lin de Narbonne Linum narbonense.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eLin de Narbonne\u003c/h3\u003e\n\u003cp\u003eLe Lin de Narbonne (Linum narbonense) est une plante vivace sauvage emblématique des garrigues, pelouses sèches et rocailles du bassin méditerranéen. Il se distingue de mai à juillet par ses grandes fleurs d\'un bleu azur intense, portées par des tiges fines et dressées au feuillage discret. Ses cinq pétales délicats captent magnifiquement la lumière du soleil. Très rustique et sobre, cette plante est idéale pour colorer les jardins secs.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852774999999999,43.382733055555555,0]},"properties":{"name":"Monts enneigés","description":"\u003cimg src=\"files/Monts enneigés 2.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eMonts enneigés\u003c/h3\u003e\n\u003cp\u003eLes monts enneigés du Mercantour, visibles en hiver et au printemps depuis les sommets de Rougiers et du massif de la Sainte-Baume, offrent un contraste saisissant avec les paysages méditerranéens. Culminant à plus de 3 000 mètres d\'altitude, cette barrière alpine ferme l\'horizon vers le nord-est. Cette silhouette blanche, se découpant sur le ciel azur, rappelle la proximité des Alpes du Sud et la diversité géographique exceptionnelle de la Provence.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.853923333333333,43.382225,0]},"properties":{"name":"Monts enneigés","description":"\u003cimg src=\"files/Monts enneigés.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eMonts enneigés\u003c/h3\u003e\n\u003cp\u003eDepuis les hauteurs de Rougiers, les points de vue offrent de saisissants panoramas sur la Provence. Depuis le vieux castrum ou la chapelle Saint-Jean, le regard embrasse la plaine agricole, le village actuel et les impressionnantes falaises du massif de la Sainte-Baume. Par ciel dégagé, l\'horizon s\'élargit de façon spectaculaire, dévoilant vers le nord le relief du mont Ventoux et, vers l\'est, les cimes enneigées de la chaîne du Mercantour.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.838489722222222,43.38266472222222,0]},"properties":{"name":"Murs de l\'oppidum","description":"\u003cimg src=\"files/Muraille de l\'oppidum.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eMurs de l\'oppidum\u003c/h3\u003e\n\u003cp\u003eL\'oppidum de Piégu, perché sur un sommet dominant Rougiers (Var), est un site fortifié préromain majeur de l\'âge du Fer. Occupé par la tribu celto-ligure des Suelteri, cet habitat de hauteur était protégé par d\'imposants remparts de pierres sèches dont les vestiges sont encore visibles. Véritable poste de guet, il offrait un contrôle stratégique sur les voies de passage de la région avant d\'être abandonné au profit de la plaine gallo-romaine.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.855288333333333,43.37229972222222,0]},"properties":{"name":"Nerprun des rochers","description":"\u003cimg src=\"files/Nerprun des rochers Rhamnus saxatilis.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eNerprun des rochers\u003c/h3\u003e\n\u003cp\u003eLe Nerprun des rochers (Rhamnus saxatilis) est un petit arbuste épineux et tortueux, parfaitement adapté aux conditions extrêmes des falaises calcaires et des éboulis ensoleillés. Ses petites feuilles ovales et finement dentées cachent des rameaux se terminant par une épine acérée. Au printemps, ses fleurs vert-jaune très discrètes laissent place en automne à de petites baies noires, très appréciées des oiseaux mais toxiques pour l\'homme.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852893055555556,43.38267666666667,0]},"properties":{"name":"Nombril de Vénus","description":"\u003cimg src=\"files/Nombril de Vénus Umbilicus rupestris.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eNombril de Vénus\u003c/h3\u003e\n\u003cp\u003eLe Nombril de Vénus (Umbilicus rupestris) est une plante grasse vivace, reine des vieux murs ombragés, des fentes de rochers et des talus frais. Elle se reconnaît immédiatement à ses feuilles charnues, circulaires et au centre légèrement creusé, évoquant un ombilic. De mai à juillet, elle dresse des grappes de clochettes verdâtres à blanchâtres. Gorgée d\'eau, elle résiste bien aux périodes sèches et possède des vertus cicatrisantes.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.833546388888888,43.368745,0]},"properties":{"name":"Oppidum de Piégu","description":"\u003cimg src=\"files/Oppidum de Piégu.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eOppidum de Piégu\u003c/h3\u003e\n\u003cp\u003eL\'oppidum de Piégu (Rougiers) témoigne d\'une occupation humaine dès l\'âge du Bronze, avant de devenir un site fortifié celto-ligure majeur à l\'âge du Fer (VIe-IIe s. av. J.-C.). Protégé par une double enceinte de pierres sèches, ce poste de guet perché abritait une communauté vivant d\'agriculture et d\'élevage. Suite à la conquête romaine et à la pacification de la Provence, la population abandonna ce sommet stratégique pour s\'installer dans la plaine.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.853148055555555,43.3821,0]},"properties":{"name":"Oratoire","description":"\u003cimg src=\"files/Oratoire anonyme.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eOratoire\u003c/h3\u003e\n\u003cp\u003eLes oratoires, petits monuments religieux ancrés dans les paysages ruraux, possédaient une triple signification. Religieuse d\'abord, ils incitaient les passants à la prière et plaçaient les lieux sous la protection d\'un saint. Protectrice ensuite, ils s\'élevaient aux carrefours, entrées de villages ou chemins de rando pour guider les voyageurs et préserver les cultures. Sociale enfin, ils marquaient les limites de territoires.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.853434722222222,43.38413138888889,0]},"properties":{"name":"Oratoire Saint Pierre","description":"\u003cimg src=\"files/Oratoire Saint Pierre.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eOratoire Saint Pierre\u003c/h3\u003e\n\u003cp\u003eL\'oratoire Saint-Pierre, situé à Rougiers (Var) sur l\'ancien chemin menant au castrum médiéval, est un témoin de la piété populaire provençale. Bâti en pierre calcaire locale, ce petit édifice présente une niche centrale, autrefois ornée de la statue du saint, protégée par une grille en fer forgé. Placée sur une voie de passage stratégique, cette halte religieuse servait à guider les voyageurs et à invoquer la protection du saint sur les cultures de la plaine.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.857706666666666,43.368318333333335,0]},"properties":{"name":"Orchis pyramidal","description":"\u003cimg src=\"files/Orchis pyramidal Anacamptis pyramidalis 2.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eOrchis pyramidal\u003c/h3\u003e\n\u003cp\u003eL\'Orchis pyramidal (Anacamptis pyramidalis) est une orchidée sauvage terrestre, fréquente de mai à juillet sur les pelouses sèches et les talus calcaires ensoleillés. Elle est facilement reconnaissable à son inflorescence dense, d\'abord conique puis pyramidale, regroupant une multitude de petites fleurs rose vif à violacé. Dépourvue de nectar, elle attire les papillons par sa couleur intense. Sa cueillette est réglementée ou interdite.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.857706666666666,43.368318333333335,0]},"properties":{"name":"Orchis pyramidal","description":"\u003cimg src=\"files/Orchis pyramidal Anacamptis pyramidalis.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eOrchis pyramidal\u003c/h3\u003e\n\u003cp\u003eLa Provence est une terre d\'élection pour les orchidées sauvages, qui s\'épanouissent au printemps sur les pelouses sèches, les garrigues et les lisières calcaires. Des espèces spectaculaires comme l\'Ophrys miroir, l\'Orchis pyramidal ou l\'Ophrys bourdon rivalisent d\'ingéniosité, imitant la forme et l\'odeur d\'insectes femelles pour assurer leur pollinisation. Fragiles, fascinantes et protégées, ces fleurs ne doivent être admirées qu\'avec les yeux.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.855288333333333,43.37229972222222,0]},"properties":{"name":"Ornithogale à feuilles droites","description":"\u003cimg src=\"files/Ornithogale à feuilles droites Ornithogalum orthophyllum.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eOrnithogale à feuilles droites\u003c/h3\u003e\n\u003cp\u003eL\'Ornithogale à feuilles droites (Ornithogalum orthophyllum), ou Dame d\'onze heures, est une petite plante bulbeuse des pelouses sèches et garrigues calcaires. Elle se distingue au printemps par ses fleurs en étoile d\'un blanc pur à six pétales, dont le revers est souligné d\'une bande verte. Ses feuilles fines et dressées portent une ligne blanche centrale. Ses fleurs ont la particularité de ne s\'ouvrir qu\'en plein soleil, souvent en fin de matinée.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852216666666666,43.382739722222226,0]},"properties":{"name":"En face de la chapelle","description":"\u003cimg src=\"files/Pilier récent.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eEn face de la chapelle\u003c/h3\u003e\n\u003cp\u003eLa chapelle du château de Rougiers, ou chapelle Saint-Jean, est le vestige le plus visible du castrum médiéval abandonné. Construite en pierre calcaire locale au XIIe siècle, cette église castrale de style roman se distingue par sa nef unique et sa voûte en berceau brisé. Liée à la vie spirituelle et défensive des seigneurs de la famille de Marseille, elle a survécu à la désertion du village et reste aujourd\'hui un haut lieu patrimonial perché.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852379722222222,43.382604722222226,0]},"properties":{"name":"Chapelle avec pilier","description":"\u003cimg src=\"files/Pilier à travertin.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eChapelle avec pilier\u003c/h3\u003e\n\u003cp\u003eLa chapelle troglodytique du castrum de Rougiers est un joyau insolite du Moyen Âge, aménagée à même la roche calcairisée. Sa principale singularité architecturale réside dans son pilier central taillé dans la masse rocheuse, qui soutient la voûte naturelle de la cavité. Ce sanctuaire rupestre, mêlant habilement géologie et ferveur religieuse, offrait aux habitants du village perché un lieu de culte secret, frais et protecteur, face au château.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.853926388888889,43.38230305555555,0]},"properties":{"name":"Pistachier térébinthe","description":"\u003cimg src=\"files/Pistachier térébinthe Pistacia terebinthus.jpg\" width=\"400\"/\u003e\n\u003ch3\u003ePistachier térébinthe\u003c/h3\u003e\n\u003cp\u003eLe Pistachier térébinthe (Pistacia terebinthus) est un arbuste emblématique de la garrigue méditerranéenne. Contrairement au lentisque, son feuillage caduc vire au rouge flamboyant à l\'automne. Ses feuilles froissées dégagent une forte odeur résineuse. Au printemps, il porte des grappes de fleurs rouges, devenant des petites baies d\'abord rouges puis bleues à maturité. Sa sève produit une résine réputée, la térébenthine de Chio.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852793055555555,43.38244805555556,0]},"properties":{"name":"Pois de senteur","description":"\u003cimg src=\"files/Pois de senteur 2 Lathyrus latifolius.jpg\" width=\"400\"/\u003e\n\u003ch3\u003ePois de senteur\u003c/h3\u003e\n\u003cp\u003eLe Pois de senteur (Lathyrus odoratus) est une plante grimpante annuelle de la famille des Fabacées, célèbre pour le parfum suave et musqué de ses fleurs. Ses tiges ailées s\'accrochent aux supports grâce à des vrilles. De la fin du printemps à l\'été, il offre des grappes de fleurs papilionacées aux coloris variés, allant du blanc au violet foncé. Très apprécié dans les jardins et en bouquets, il redoute la sécheresse intense et préfère les sols frais.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852893055555556,43.38267666666667,0]},"properties":{"name":"Pois de senteur 2","description":"\u003cimg src=\"files/Pois de senteur Lathyrus latifolius.jpg\" width=\"400\"/\u003e\n\u003ch3\u003ePois de senteur 2\u003c/h3\u003e\n\u003cp\u003eLe Pois de senteur cache de secrets fascinants : il est le héros historique des lois de la génétique de Mendel ! Contrairement aux apparences, ses graines très toxiques contiennent une toxine (lathyrism) capable de paralyser les muscles. De plus, sa fleur possède un mécanisme à détente : le pétale inférieur retient l\'étamine sous pression jusqu\'à ce qu\'un insecte lourd s\'y pose, déclenchant une véritable explosion de pollen sous son ventre.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852551388888888,43.382938333333335,0]},"properties":{"name":"Polypode du Sud","description":"\u003cimg src=\"files/Polypode du Sud Polypodium cambricum.jpg\" width=\"400\"/\u003e\n\u003ch3\u003ePolypode du Sud\u003c/h3\u003e\n\u003cp\u003eLe Polypode du Sud (Polypodium cambricum) est une fougère vivace typique des régions méditerranéennes. Contrairement à d\'autres, elle est en repos végétatif l\'été pour survivre à la sécheresse et reverdit dès les premières pluies d\'automne. Ses frondes découpées et coriaces s\'épanouissent sur les vieux murs, les rochers calcaires ombragés ou les troncs d\'arbres. Sous ses feuilles, de gros amas de spores (sores) jaunes puis dorés s\'alignent sans membrane.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.851896388888888,43.38491972222222,0]},"properties":{"name":"Dolomies","description":"\u003cimg src=\"files/Rocher1.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eDolomies\u003c/h3\u003e\n\u003cp\u003eLe sous-sol de Rougiers est marqué par les calcaires et les dolomies du Trias et du Jurassique. Les calcaires, issus de sédiments marins, forment des barres rocheuses blanches où l\'eau creuse des réseaux karstiques. Les dolomies, plus riches en magnésium, se reconnaissent à leur teinte gris-brun et leur aspect rugueux. En se désagrégeant, elles créent des reliefs ruiniformes spectaculaires et des sols filtrants, parfaits pour la vigne et la garrigue.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852368333333333,43.383176666666664,0]},"properties":{"name":"Mont Aurélien vu du Sud","description":"\u003cimg src=\"files/Rougiers Mont Aurélien.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eMont Aurélien vu du Sud\u003c/h3\u003e\n\u003cp\u003eVéritable citadelle naturelle culminant à 879 mètres, cette crête rocheuse structure le paysage, offrant un point de repère incontournable pour toute la Provence verte.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852196388888888,43.382758333333335,0]},"properties":{"name":"Sainte Baume","description":"\u003cimg src=\"files/Sainte Baume.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eSainte Baume\u003c/h3\u003e\n\u003cp\u003eLa Sainte-Baume est jalonnée de repères mythiques. Son Saint-Pilon (994 m) offre un panorama à 360° sur la Provence et la mer. En contrebas de la crête, la Grotte de sainte Marie-Madeleine, haut lieu de pèlerinage, est nichée au cœur d\'une falaise calcaire de 12 km de long. Le col de l\'Espigoulier marque son entrée occidentale, tandis que la forêt relique, dense et mystique, sert de guide végétal aux marcheurs vers le sommet.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.848416944444444,43.39863944444444,0]},"properties":{"name":"Sapin d\'Andalousie","description":"\u003cimg src=\"files/Sapin d Andalousie Abies pinsapo.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eSapin d\'Andalousie\u003c/h3\u003e\n\u003cp\u003eLe Sapin d\'Andalousie (Abies pinsapo), ou pinsapo, est une relique glaciaire rare qui ne survit qu\'en Andalousie et au Maroc. Adapté aux montagnes calcaires méditerranéennes, il se distingue par ses aiguilles courtes, rigides et pointues, disposées en écouvillon (tout autour du rameau) comme des brosses à bouteille. Ses grands cônes dressés ressemblent à des bougies. Menacée par le changement climatique, cette espèce unique est strictement protégée.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.851316388888889,43.38947638888889,0]},"properties":{"name":"Sauge arbustive","description":"\u003cimg src=\"files/Sauge arbustive Salvia microphylla.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eSauge arbustive\u003c/h3\u003e\n\u003cp\u003eLa Sauge arbustive (Salvia microphylla ou greggii) envoûte par son parfum unique. Dès qu\'on frôle son feuillage persistant, ses feuilles libèrent une puissante odeur aromatique, mêlant des notes de menthe, de cassis et de résine fruitée. Originaire du Mexique, cet arbrisseau résistant produit du printemps aux gelées une profusion de fleurs bilabiées, souvent rouge vif. Son parfum suave, conçu pour attirer les pollinisateurs, embaume tout le jardin.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.852974722222222,43.38234138888889,0]},"properties":{"name":"Mousse","description":"\u003cimg src=\"files/Sphaigne.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eMousse\u003c/h3\u003e\n\u003cp\u003eSur les sols calcaires et secs de Provence, les mousses relèvent un défi extrême. Des espèces comme Tortella tortuosa ou Grimmia forment de petits coussins denses capables de se déshydrater totalement en été (reviviscence) pour reverdir à la première pluie. En retenant l\'humidité et en piégeant les sédiments sur la roche nue, ces mousses pionnières créent un premier terreau fertile, indispensable à l\'installation de la garrigue.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.857451388888888,43.37408666666667,0]},"properties":{"name":"Sylvain azuré","description":"\u003cimg src=\"files/Sylvain azuré Limenitis reducta .jpg\" width=\"400\"/\u003e\n\u003ch3\u003eSylvain azuré\u003c/h3\u003e\n\u003cp\u003eLe Sylvain azuré (Limenitis reducta) est un magnifique papillon des lisières et clairières ensoleillées. Le dessus de ses ailes arbore un noir profond illuminé de reflets bleu métallique et d\'une rangée de taches blanches. Le dessous, quant à lui, révèle un motif complexe de blanc, de roux et de gris-bleu. Sa chenille, dotée de pointes, se développe exclusivement sur les chèvrefeuilles. Son vol, alternant battements rapides et longs planés, est d\'une grande élégance.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.857455,43.37408472222222,0]},"properties":{"name":"Sylvain azuré 2","description":"\u003cimg src=\"files/Sylvain azuré Limenitis reducta 2.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eSylvain azuré 2\u003c/h3\u003e\n\u003cp\u003eLe Sylvain azuré a un secret : ses reflets bleus ne viennent d\'aucun pigment, mais de la structure microscopique de ses écailles qui diffracte la lumière ! Côté ruse, sa chenille hiverne dans un hibernaculum, un abri sophistiqué qu\'elle fabrique en découpant et en cousant une feuille de chèvrefeuille avec sa soie. Pour se défendre, elle s\'aligne sur les nervures des feuilles et accumule ses propres crottes pour se camoufler en débris végétaux.\u003c/p\u003e"}},{"type":"Feature","geometry":{"type":"Point","coordinates":[5.854003055555555,43.38189666666667,0]},"properties":{"name":"Véronique douteuse","description":"\u003cimg src=\"files/Véronique douteuse Veronica orsiniana.jpg\" width=\"400\"/\u003e\n\u003ch3\u003eVéronique douteuse\u003c/h3\u003e\n\u003cp\u003eLa Véronique douteuse (Veronica dubia, souvent rattachée à V. austriaca) est une plante rare et discrète des pelouses sèches et des lisières calcaires. Cette vivace se distingue par ses tiges dressées portant des feuilles finement découpées et de magnifiques grappes de fleurs d\'un bleu azur intense à quatre pétales asymétriques. Sa floraison printanière éphémère et ses critères d\'identification pointus en font un trésor botanique recherché des naturalistes.\u003c/p\u003e"}}]};

const map = L.map('map').fitBounds(L.geoJSON(g).getBounds());
L.tileLayer('https://data.geopf.fr/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=GEOGRAPHICALGRIDSYSTEMS.PLANIGNV2&STYLE=normal&FORMAT=image/png&TILEMATRIXSET=PM&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}',{attribution:'&copy; IGN - Plan v2',maxZoom:19}).addTo(map);

// Afficher les traces (lignes)
L.geoJSON(g,{
  style:{color:'#c00',weight:6},
  filter: function(feature) {
    return feature.geometry.type !== 'Point';
  }
}).addTo(map);

// Afficher les waypoints (points)
L.geoJSON(g,{
  filter: function(feature) {
    return feature.geometry.type === 'Point';
  },
  pointToLayer: function(feature, latlng) {
    // Créer un marqueur personnalisé
    const marker = L.marker(latlng, {
      icon: L.divIcon({
        className: 'waypoint-marker',
        html: '<div style="background:#007bff;width:24px;height:24px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3)"></div>',
        iconSize: [24, 24],
        iconAnchor: [12, 12]
      })
    });
    
    // Ajouter popup avec infos du waypoint
    let popupContent = '<div>';
    if (feature.properties.name) {
      popupContent += '<h4>📍 ' + feature.properties.name + '</h4>';
    }
    if (feature.properties.description || feature.properties.desc) {
      const desc = feature.properties.description || feature.properties.desc;
      popupContent += '<p>' + desc + '</p>';
    }
    if (feature.geometry.coordinates[2]) {
      popupContent += '<p><strong>Altitude:</strong> ' + Math.round(feature.geometry.coordinates[2]) + ' m</p>';
    }
    popupContent += '</div>';
    
    marker.bindPopup(popupContent);
    
    return marker;
  }
}).addTo(map);

function download(f){
  let data, ext, type;
  if(f==='gpx'){data=togpx(g);ext='gpx';type='application/gpx+xml';}
  if(f==='kml'){data=tokml(g);ext='kml';type='application/vnd.google-earth.kml+xml';}
  if(f==='geojson'){data=JSON.stringify(g,null,2);ext='geojson';type='application/geo+json';}
  
  const blob = new Blob([data],{type});
  
  // Essayer d'utiliser l'API File System Access (Chrome/Edge)
  if ('showSaveFilePicker' in window) {
    const opts = {
      suggestedName: 'trace-Rougiers-14.82km-2026-05-18.' + ext,
      types: [{
        description: ext.toUpperCase() + ' File',
        accept: {[type]: ['.' + ext]}
      }],
      startIn: 'documents'
    };
    
    window.showSaveFilePicker(opts).then(fileHandle => {
      return fileHandle.createWritable();
    }).then(writable => {
      writable.write(blob);
      return writable.close();
    }).catch(err => {
      if (err.name !== 'AbortError') {
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download='trace-Rougiers-14.82km-2026-05-18.'+ext;
        a.click();
      }
    });
  } else {
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='trace-Rougiers-14.82km-2026-05-18.'+ext;
    a.click();
  }
}

function share(){
  const blob = new Blob([document.documentElement.outerHTML], {type: 'text/html'});
  const file = new File([blob], 'trace-Rougiers-14.82km-2026-05-18.html', {type: 'text/html'});
  
  if ('showSaveFilePicker' in window) {
    const opts = {
      suggestedName: 'trace-Rougiers-14.82km-2026-05-18.html',
      types: [{
        description: 'HTML File',
        accept: {'text/html': ['.html']}
      }],
      startIn: 'documents'
    };
    
    window.showSaveFilePicker(opts).then(fileHandle => {
      return fileHandle.createWritable();
    }).then(writable => {
      writable.write(blob);
      return writable.close();
    }).then(() => {
      alert('Fichier HTML sauvegardé avec succès !');
    }).catch(err => {
      if (err.name === 'AbortError') {
        return;
      }
      if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:'trace-Rougiers-14.82km-2026-05-18',text:'Découvrez ma trace GPS'})
          .catch(err=>console.log('Partage annulé'));
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'trace-Rougiers-14.82km-2026-05-18.html';
        a.click();
        URL.revokeObjectURL(url);
        alert('Fichier téléchargé. Vous pouvez le partager par email ou autre moyen.');
      }
    });
  } else if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file],title:'trace-Rougiers-14.82km-2026-05-18',text:'Découvrez ma trace GPS'})
      .catch(err=>console.log('Partage annulé'));
  } else {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'trace-Rougiers-14.82km-2026-05-18.html';
    a.click();
    URL.revokeObjectURL(url);
    alert('Fichier téléchargé. Vous pouvez le partager par email ou autre moyen.');
  }
}

async function exportPDF(){
  const btn = event.target;
  btn.textContent = '⏳ Génération...';
  btn.disabled = true;
  
  try{
    if (typeof window.jspdf === 'undefined') {
      throw new Error('jsPDF non chargé');
    }
    
    await new Promise(resolve => {
      let tilesLoading = 0;
      map.eachLayer(layer => {
        if (layer._tiles) {
          Object.keys(layer._tiles).forEach(key => {
            const tile = layer._tiles[key];
            if (!tile.complete) {
              tilesLoading++;
              tile.onload = () => {
                tilesLoading--;
                if (tilesLoading === 0) resolve();
              };
            }
          });
        }
      });
      if (tilesLoading === 0) resolve();
      setTimeout(resolve, 5000);
    });
    
    await new Promise(resolve => setTimeout(resolve, 500));
    
    const canvas = await html2canvas(document.body, {
      useCORS: true,
      allowTaint: false,
      logging: false,
      scale: 2,
      backgroundColor: '#ffffff'
    });
    
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const { jsPDF } = window.jspdf;
    
    const orientation = canvas.width > canvas.height ? 'l' : 'p';
    const pdf = new jsPDF({
      orientation: orientation,
      unit: 'mm',
      format: 'a4'
    });
    
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const imgWidth = pageWidth;
    const imgHeight = (canvas.height * pageWidth) / canvas.width;
    
    let finalWidth = imgWidth;
    let finalHeight = imgHeight;
    if (imgHeight > pageHeight) {
      finalHeight = pageHeight;
      finalWidth = (canvas.width * pageHeight) / canvas.height;
    }
    
    pdf.addImage(imgData, 'JPEG', 0, 0, finalWidth, finalHeight);
    
    if ('showSaveFilePicker' in window) {
      const pdfBlob = pdf.output('blob');
      const opts = {
        suggestedName: 'trace-Rougiers-14.82km-2026-05-18.pdf',
        types: [{
          description: 'PDF Document',
          accept: {'application/pdf': ['.pdf']}
        }],
        startIn: 'documents'
      };
      
      try {
        const fileHandle = await window.showSaveFilePicker(opts);
        const writable = await fileHandle.createWritable();
        await writable.write(pdfBlob);
        await writable.close();
        
        btn.textContent = '✅ PDF sauvegardé';
      } catch(saveErr) {
        if (saveErr.name !== 'AbortError') {
          pdf.save('trace-Rougiers-14.82km-2026-05-18.pdf');
          btn.textContent = '✅ PDF créé';
        } else {
          btn.textContent = '📄 PDF';
        }
      }
    } else {
      pdf.save('trace-Rougiers-14.82km-2026-05-18.pdf');
      btn.textContent = '✅ PDF créé';
    }
    
    setTimeout(() => {
      btn.textContent = '📄 PDF';
    }, 2000);
  } catch(err){
    console.error('Erreur PDF:', err);
    try {
      const canvas = await html2canvas(document.body, {
        useCORS: true,
        allowTaint: false,
        logging: false,
        scale: 2
      });
      const imgData = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = 'trace-Rougiers-14.82km-2026-05-18.png';
      link.href = imgData;
      link.click();
      alert('Export PDF non disponible, image PNG générée à la place.');
    } catch(err2) {
      alert('Erreur lors de la génération: ' + err2.message);
    }
    btn.textContent = '📄 PDF';
  } finally{
    btn.disabled = false;
  }
}
</script>
