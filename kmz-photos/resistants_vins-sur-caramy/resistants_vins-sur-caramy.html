var wps=[{"name":"Départ","lat":43.431945,"lon":6.142513300000001,"alt":186.1,"comment":"Animation Stéphanie","photo":null},{"name":"Citerne","lat":43.4238483,"lon":6.144526699999999,"alt":291.36,"comment":"Peinte en vert pour s'intégrer à la garrigue, elle stocke généralement entre 30 et 120 mètres cubes d'eau. Placée stratégiquement le long des pistes forestières, elle garantit aux pompiers une ressource en eau immédiate et pressurisée en plein cœur des massifs pour stopper les départs de feux.","photo":"photos/omimg_20260522_095936.jpg"},{"name":"Cabane de charbonnier","lat":43.4273733,"lon":6.15561,"alt":317.93,"comment":"En Provence, la cabane de charbonnier était un abri précaire et temporaire au cœur de la forêt.Bâtie en cône avec des rondins de bois, elle était recouverte de feuillage et de terre pour l'isoler. Le charbonnier y vivait des semaines durant pour surveiller jour et nuit la cuisson de sa meule de bois. Ce vestige témoigne de l'ancienne économie forestière des massifs provençaux.","photo":"photos/omimg_20260522_102058.jpg"},{"name":"Ciste de Montpellier","lat":43.4282983,"lon":6.156515,"alt":318.19,"comment":"\nConversation avec Gemini\nCiterne DFCI en Provence en 480 caractères\n\nEn Provence, la citerne DFCI (Défense des Forêts Contre les Incendies) est un maillon clé de la sécurité estivale.\nPoint d'eau incendie DFCI, généré par IA\nPoint d'eau incendie DFCI. Source : Wikipédia\n\nPeinte en vert pour s'intégrer à la garrigue, elle stocke généralement entre 30 et 120 mètres cubes d'eau. Placée stratégiquement le long des pistes forestières, elle garantit aux pompiers une ressource en eau immédiate et pres","photo":"photos/omimg_20260522_102333.jpg"},{"name":"Monument aux résistants","lat":43.42948,"lon":6.1574633,"alt":316.64,"comment":"À Vins-sur-Caramy, ce monument rend hommage aux maquisards FTP du camp Gabriel Péri.En juillet 1944, suite à une dénonciation, les soldats allemands encerclèrent le maquis au domaine de la Cabane. Quatre jeunes résistants y furent arrêtés puis fusillés. Érigée sur le \"terrain Vermicelle\", cette stèle rappelle leur sacrifice pour la Libération de la Provence.","photo":"photos/omimg_20260522_102637.jpg"},{"name":"Grotte aux résistants","lat":43.4313683,"lon":6.1595933,"alt":312.85,"comment":"","photo":"photos/omimg_20260522_104445.jpg"},{"name":"Grotte aux résistants","lat":43.4313683,"lon":6.1595933,"alt":312.85,"comment":"Située sur le plateau calcaire de Vins-sur-Caramy, la Baume de Savoye servait de cache d’armes secrète pour la Résistance varoise en 1944.Le 29 juillet 1944, après avoir déplacé l'arsenal, quatre maquisards de la Section Atterrissage et Parachutage y furent conduits par l'occupant. Malgré la torture, ils refusèrent de livrer l'emplacement de la nouvelle cache et furent fusillés devant la grotte vide.","photo":"photos/omimg_20260522_104500.jpg"},{"name":"La stèle","lat":43.4316933,"lon":6.1595467,"alt":327.25,"comment":"La stèle au carrefour de la Grotte des Résistants à Vins-sur-Caramy honore la mémoire de quatre maquisards martyrs, dont trois appartenaient à la même fratrie : la **famille Mozzone**.\n\nLes noms gravés dans la pierre sont ceux des frères **Jean, Eugène et Louis Mozzone**, ainsi que de leur compagnon d'armes **Théodore Linari**. Arrêtés par l'occupant en juillet 1944 pour avoir caché un arsenal parachuté, ils furent fusillés sur place après avoir courageusement gardé le secret sous la torture.","photo":"photos/omimg_20260522_104948.jpg"},{"name":"Les massifs boisés","lat":43.4316933,"lon":6.1595467,"alt":327.25,"comment":"Deuxième département le plus boisé de France, le Var abrite des massifs forestiers d’une richesse exceptionnelle.\n\nDes roches rouges de l'Estérel aux forêts sauvages des Maures, en passant par la Sainte-Baume, ces espaces combinent pins maritimes, chênes-lièges et garrigue odorante. Ce poumon vert, fragile et très protégé face aux incendies, forge l'identité sauvage et la biodiversité des paysages varois.","photo":"photos/omimg_20260522_105113.jpg"},{"name":"Filaire à larges feuilles","lat":43.4324383,"lon":6.1474117,"alt":180.94,"comment":"Le **filaire à larges feuilles** (*Phillyrea latifolia*) est un arbuste persistant typique des forêts et garrigues méditerranéennes.\n\nProche de l'olivier, il se reconnaît à ses feuilles coriaces, ovales et finement dentées. Très résistant à la sécheresse et aux incendies grâce à sa capacité à rejeter de souche, il produit au printemps de discrètes fleurs jaunâtres, suivies de petites baies noires appréciées des oiseaux.","photo":"photos/omimg_20260522_113346.jpg"},{"name":"Pont médiéval","lat":43.4314367,"lon":6.14204,"alt":0,"comment":"Franchissant le fleuve Caramy à Vins-sur-Caramy, ce **pont médiéval** (souvent baptisé à tort \"pont romain\") est un joyau en pierre du Moyen Âge.\n\nBâti avec trois arches robustes en pierre de taille, il enjambe un plan d'eau magnifique et verdoyant. Cet ouvrage historique, qui résistait aux crues, est aujourd'hui un lieu de passage pittoresque et un spot de fraîcheur incontournable pour les baigneurs en été.","photo":"photos/omimg_20260522_114214.jpg"},{"name":"Le Caramy","lat":43.4314417,"lon":6.1420333,"alt":189.02,"comment":"Né dans le massif de la Sainte-Baume, le **Caramy** est une rivière emblématique du Var.\n\nLong de 46 km, ce cours d'eau a sculpté de magnifiques gorges calcaires entre Mazaugues et Tourves avant de s'écouler paisiblement vers Vins-sur-Caramy. Il alimente le lac de Carcès et se jette dans l'Argens. C'est une oasis de fraîcheur cruciale pour la biodiversité et les paysages de Provence Verte.","photo":"photos/omimg_20260522_114245.jpg"},{"name":"Arrivée","lat":43.431975,"lon":6.1423233,"alt":190.19,"comment":"","photo":null}];

function dl(b64,name,mime){var a=document.createElement('a');a.href='data:'+mime+';base64,'+b64;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);}
function om(src){document.getElementById('mi').src=src;document.getElementById('modal').classList.add('open');}
function cm(e){if(!e||e.target===document.getElementById('modal')||e.target===document.getElementById('mx'))document.getElementById('modal').classList.remove('open');}
</script>
