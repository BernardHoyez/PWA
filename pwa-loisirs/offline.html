<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors-ligne — Loisirs Proches</title>
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg0: #0d0d1a; --bg1: #13132b; --bg2: #1e1e3a;
      --accent: #ff6b6b; --accent2: #ffd166; --accent3: #06d6a0;
      --text0: #f0eef8; --text1: #bbb8d4; --text2: #7a7899;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg0);
      color: var(--text0);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 20px;
    }
    .icon { font-size: 4rem; margin-bottom: 24px; opacity: 0.8; }
    h1 {
      font-family: 'Syne', system-ui, sans-serif;
      font-size: 1.8rem; font-weight: 800;
      margin-bottom: 12px; letter-spacing: -0.02em;
    }
    p { color: var(--text1); font-size: 0.95rem; line-height: 1.6; max-width: 360px; }
    .hint {
      margin-top: 28px;
      font-size: 0.82rem; color: var(--text2);
      background: var(--bg2);
      border-radius: 10px;
      padding: 14px 20px;
      max-width: 360px;
    }
    .btn {
      margin-top: 28px;
      padding: 12px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.85; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400&display=swap" rel="stylesheet">
</head>
<body>
  <div class="icon">📡</div>
  <h1>Vous êtes hors-ligne</h1>
  <p>La connexion réseau est indisponible. Reconnectez-vous pour rechercher de nouveaux événements.</p>
  <div class="hint">
    💡 Les événements chargés lors de votre dernière session sont disponibles via la page principale.
  </div>
  <a href="./index.html" class="btn">↩ Retour à l'application</a>
</body>
</html>
