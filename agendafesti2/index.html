<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaFesti2 - Open Data</title>
    <link rel="stylesheet" href="./style.css">
    <meta name="theme-color" content="#2196F3"> </head>
<body>
    <header style="background-color: #2196F3;">
        <h1>🎉 AgendaFesti 2 (Édition Commune)</h1>
        <p>Données Open Data Régionales en Direct</p>
        
        <div class="filters-container">
            <div class="filter-group">
                <label for="range-distance">📍 Rayon : <span id="val-distance">25</span> km</label>
                <input type="range" id="range-distance" min="1" max="40" value="25">
            </div>
            <div class="filter-group">
                <label for="range-delai">📅 Horizon : <span id="val-delai">15</span> jours</label>
                <input type="range" id="range-delai" min="1" max="20" value="15">
            </div>
        </div>

        <button id="geo-btn" style="color: #2196F3;">📍 Ajuster & Synchroniser</button>
        <div id="status">Connexion aux serveurs régionaux...</div>
    </header>

    <main id="events-container">
        </main>

    <script src="./app.js"></script>
</body>
</html>
