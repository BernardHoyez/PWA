<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kmz2htmlgk - Visualiseur de Randonnée</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Bibliothèques tierces pour parser le KMZ et exporter (Via CDN fiables) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/togeojson@0.16.0/togeojson.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary-color: #4CAF50;
            --dark-color: #333;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background: var(--dark-color);
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        h1 { margin: 0; font-size: 1.2rem; }
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { opacity: 0.9; }
        #map { flex: 1; width: 100%; }
        
        /* Popups responsives */
        .popup-content {
            max-width: 280px;
            font-size: 0.9rem;
        }
        .popup-content img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin: 5px 0;
            cursor: pointer;
        }
        .popup-meta {
            font-size: 0.75rem;
            color: #666;
            margin-top: 5px;
        }
        
        /* Modal plein écran pour agrandissement photo */
        #photo-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        #photo-modal img { max-width: 95%; max-height: 95%; object-fit: contain; }
        #photo-modal .close {
            position: absolute;
            top: 20px; right: 20px;
            color: white; font-size: 2rem; cursor: pointer;
        }

        /* Styles pour l'impression / PDF */
        @media print {
            header, .leaflet-control-container { display: none !important; }
            #map { height: 100vh; width: 100vw; }
        }
    </style>
</head>
<body>

    <header>
        <h1>kmz2htmlgk</h1>
        <input type="file" id="file-input" accept=".kmz,.kml" style="color: white;">
        <div class="btn-group">
            <button onclick="exportFormat('kml')">KML</button>
            <button onclick="exportFormat('gpx')">GPX</button>
            <button onclick="exportFormat('json')">JSON</button>
            <button onclick="exportFormat('pdf')">PDF</button>
            <button onclick="window.print()">Imprimer</button>
        </div>
    </header>

    <div id="map"></div>

    <!-- Fenêtre d'agrandissement de photo -->
    <div id="photo-modal" onclick="this.style.display='none'">
        <span class="close">&times;</span>
        <img id="modal-img" src="" alt="Agrandissement">
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Initialisation de la carte
        const map = L.map('map').setView([46.603354, 1.888334], 6); // Centré sur la France

        // Fonds de carte (Fonds publics ou ouverts)
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Flux Géoplateforme IGN (Plan V2 et Orthophoto)
        const ignPlan = L.tileLayer('https://data.geopf.fr/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=GEOGRAPHICALGRIDSYSTEMS.PLANIGNV2&STYLE=normal&FORMAT=image/png&TILEMATRIXSET=PM&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}', {
            attribution: '© IGN'
        });

        const ignOrtho = L.tileLayer('https://data.geopf.fr/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=ORTHOIMAGERY.ORTHOPHOTOS&STYLE=normal&FORMAT=image/jpeg&TILEMATRIXSET=PM&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}', {
            attribution: '© IGN'
        });

        const baseMaps = {
            "OpenStreetMap": osm,
            "IGN Plan V2": ignPlan,
            "IGN BD Ortho": ignOrtho
        };
        L.control.layers(baseMaps).addTo(map);

        // Variables globales pour stocker les données du tracé actif
        let currentGeoJSON = null;

        // 2. Enregistrement du Service Worker pour la PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('Service Worker enregistré avec succès.'))
                .catch(err => console.error('Échec enregistrement SW:', err));
        }

        // 3. Gestion de l'importation de fichier KMZ / KML
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                if (file.name.endsWith('.kmz')) {
                    // Traitement du KMZ (Zip contenant un doc.kml et des images)
                    JSZip.loadAsync(event.target.result).then(async function(zip) {
                        const kmlFile = zip.file("doc.kml") || Object.keys(zip.files).find(f => f.endsWith('.kml'));
                        if (kmlFile) {
                            const kmlText = await kmlFile.async("text");
                            processKML(kmlText, zip);
                        }
                    });
                } else {
                    // KML Direct
                    processKML(event.target.result);
                }
            };

            if (file.name.endsWith('.kmz')) {
                reader.readAsArrayBuffer(file);
            } else {
                reader.readAsText(file);
            }
        });

        // 4. Traitement et affichage des données géographiques
        function processKML(kmlText, zip = null) {
            const parser = new DOMParser();
            const kmlDom = parser.parseFromString(kmlText, "text/xml");
            let geojson = toGeoJSON.kml(kmlDom);
            currentGeoJSON = geojson;

            // Nettoyage de la carte précédente
            map.eachLayer((layer) => {
                if (!!layer.toGeoJSON && layer !== osm) map.removeLayer(layer);
            });

            const geoLayer = L.geoJSON(geojson, {
                onEachFeature: async function (feature, layer) {
                    if (feature.geometry.type === "Point") {
                        let name = (feature.properties.name || "Waypoint").substring(0, 50);
                        let comment = feature.properties.description || "Aucun commentaire.";
                        let coords = feature.geometry.coordinates;
                        let lat = coords[1].toFixed(6);
                        let lng = coords[0].toFixed(6);
                        let alt = coords[2] ? coords[2].toFixed(0) + "m" : "Non spécifiée";
                        let imgSrc = "https://via.placeholder.com/150?text=Pas+d'image";

                        // Si archive KMZ, extraction et optimisation de l'image liée au waypoint
                        if (zip && feature.properties.description) {
                            // Recherche d'une balise img ou d'une référence texte dans la description
                            const match = feature.properties.description.match(/src="([^"]+)"/) || [null, feature.properties.name];
                            if (match[1]) {
                                const cleanPath = match[1].replace('../', '').trim();
                                const imgFile = zip.file(cleanPath) || zip.file("photos/" + cleanPath);
                                if (imgFile) {
                                    const blob = await imgFile.async("blob");
                                    imgSrc = URL.createObjectURL(blob);
                                    // Optionnel : Extraction EXIF si le blob est disponible
                                    EXIF.getData(blob, function() {
                                        let exifAlt = EXIF.getTag(this, "GPSAltitude");
                                        if (exifAlt) alt = exifAlt.value + "m (EXIF)";
                                    });
                                }
                            }
                        }

                        // Structure HTML de la Pop-up optimisée et responsive
                        let popupHtml = `
                            <div class="popup-content">
                                <h3>${name}</h3>
                                <img src="${imgSrc}" alt="${name}" onclick="openModal('${imgSrc}')">
                                <p>${comment.substring(0, 500)}</p>
                                <div class="popup-meta">
                                    <strong>GPS :</strong> ${lat}, ${lng}<br>
                                    <strong>Altitude :</strong> ${alt}
                                </div>
                                <button style="margin-top:8px; width:100%; font-size:0.8rem;" onclick="openModal('${imgSrc}')">Agrandir</button>
                            </div>
                        `;
                        layer.bindPopup(popupHtml, { maxWidth: window.innerWidth < 600 ? 260 : 400 });
                    }
                }
            }).addTo(map);

            // Ajustement de la vue sur le tracé
            if (geoLayer.getBounds().isValid()) {
                map.fitBounds(geoLayer.getBounds());
            }
        }

        // 5. Fonction d'agrandissement de l'image (Modal plein écran)
        function openModal(src) {
            document.getElementById('modal-img').src = src;
            document.getElementById('photo-modal').style.display = 'flex';
        }

        // 6. Fonctions d'exportations (Placeholders opérationnels)
        function exportFormat(type) {
            if (!currentGeoJSON) {
                alert("Veuillez d'abord charger un fichier de randonnée.");
                return;
            }

            let dataStr = "";
            let filename = "randonnee." + type;

            if (type === 'json') {
                dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(currentGeoJSON, null, 2));
                triggerDownload(dataStr, filename);
            } else if (type === 'gpx') {
                // Conversion simplifiée ou structure brute pour exemple
                alert("Export GPX : Dans une version de production complète, utilisez un convertisseur GeoJSON vers GPX (ex: togpx).");
            } else if (type === 'kml') {
                alert("Export KML disponible via le fichier doc.kml d'origine.");
            } else if (type === 'pdf') {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.text("Rapport de Randonnée - kmz2htmlgk", 10, 10);
                doc.text("Généré depuis GitHub Pages.", 10, 20);
                doc.save("randonnee-export.pdf");
            }
        }

        function triggerDownload(dataUri, filename) {
            const link = document.createElement('a');
            link.setAttribute("href", dataUri);
            link.setAttribute("download", filename);
            document.body.appendChild(link);
            link.click();
            link.remove();
        }
    </script>
</body>
</html>
