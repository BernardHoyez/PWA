<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a3a0f">
<title>Marando</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --forest: #1a3a0f; --moss: #2d5a1b; --fern: #4a7c35; --sage: #7aad5a;
  --mist: #b8d4a0; --cream: #f0ebe0; --bark: #5c3d1e; --stone: #8a8070;
  --ink: #0d1a09; --snow: #f8f5ee; --alert: #c84b1a;
  --panel-bg: #111f0a; --sidebar-w: 340px; --header-h: 58px;
  --radius: 8px; --transition: 0.22s cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background: var(--ink); color: var(--cream); }

/* HEADER */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: var(--header-h);
  background: linear-gradient(135deg, var(--forest), #0d2208);
  border-bottom: 1px solid var(--moss); display: flex; align-items: center;
  box-shadow: 0 2px 20px rgba(0,0,0,.5);
}
#logo {
  display: flex; align-items: center; gap: 10px; padding: 0 20px;
  font-family: 'Space Mono', monospace; font-size: 1.3rem; font-weight: 700;
  color: var(--sage); letter-spacing: .08em; flex-shrink: 0;
}
#tab-bar { display: flex; height: 100%; flex: 1; border-left: 1px solid rgba(255,255,255,.07); }
.tab-btn {
  display: flex; align-items: center; gap: 8px; padding: 0 24px;
  font-size: .88rem; font-weight: 500; color: var(--stone);
  cursor: pointer; border: none; background: none;
  border-bottom: 3px solid transparent; transition: var(--transition);
}
.tab-btn:hover { color: var(--mist); background: rgba(255,255,255,.04); }
.tab-btn.active { color: var(--sage); border-bottom-color: var(--sage); background: rgba(74,124,53,.08); }

/* APP */
#app { position: fixed; top: var(--header-h); left: 0; right: 0; bottom: 0; display: flex; }
.panel { display: none; width: 100%; height: 100%; }
.panel.active { display: flex; }
#editor-panel { flex-direction: row; }

/* SIDEBAR */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0; background: var(--panel-bg);
  border-right: 1px solid rgba(255,255,255,.06);
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid rgba(255,255,255,.06); background: rgba(0,0,0,.2); }
#sidebar-header h3 { font-size: .78rem; text-transform: uppercase; letter-spacing: .12em; color: var(--stone); margin-bottom: 8px; }

/* DROP ZONE */
#file-drop-zone {
  border: 2px dashed var(--moss); border-radius: var(--radius);
  padding: 18px 12px; text-align: center; cursor: pointer;
  transition: var(--transition); background: rgba(45,90,27,.06);
}
#file-drop-zone:hover, #file-drop-zone.drag-over { border-color: var(--sage); background: rgba(74,124,53,.12); }
#file-drop-zone input { display: none; }
#file-drop-zone .drop-icon { font-size: 1.8rem; margin-bottom: 4px; }
#file-drop-zone p { font-size: .78rem; color: var(--stone); line-height: 1.4; }
#file-drop-zone p strong { color: var(--sage); }
#file-name-display { margin-top: 6px; font-size: .72rem; color: var(--mist); font-family: 'Space Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* MAP CONTROLS */
#map-controls { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,.06); display: flex; gap: 6px; }
.map-btn {
  flex: 1; padding: 6px 8px; font-size: .72rem; font-weight: 500;
  border: 1px solid rgba(255,255,255,.1); border-radius: 5px;
  background: rgba(255,255,255,.04); color: var(--stone); cursor: pointer; transition: var(--transition);
}
.map-btn:hover { color: var(--cream); border-color: var(--fern); }
.map-btn.active { background: var(--moss); color: var(--snow); border-color: var(--sage); }

/* WAYPOINTS */
#waypoints-list { flex: 1; overflow-y: auto; padding: 8px; }
#waypoints-list::-webkit-scrollbar { width: 4px; }
#waypoints-list::-webkit-scrollbar-thumb { background: var(--moss); border-radius: 2px; }

.wp-card {
  background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07);
  border-radius: var(--radius); margin-bottom: 6px; overflow: hidden; cursor: pointer;
}
.wp-card:hover { border-color: var(--fern); }
.wp-card.selected { border-color: var(--sage); background: rgba(74,124,53,.14); }
.wp-card-header { display: flex; align-items: center; gap: 8px; padding: 8px 10px; }
.wp-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .85rem; flex-shrink: 0; background: var(--moss); }
.wp-icon.has-photo { background: var(--bark); }
.wp-info { flex: 1; min-width: 0; }
.wp-name-display { font-size: .83rem; font-weight: 500; color: var(--cream); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.wp-coords { font-size: .67rem; color: var(--stone); font-family: 'Space Mono', monospace; }
.wp-card-body { padding: 0 10px 10px; display: none; }
.wp-card.expanded .wp-card-body { display: block; }
.wp-thumb { width: 100%; height: 100px; object-fit: cover; border-radius: 5px; margin-bottom: 8px; }
.form-group { margin-bottom: 8px; }
.form-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .08em; color: var(--stone); display: block; margin-bottom: 4px; }
.form-input {
  width: 100%; padding: 6px 8px; background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1); border-radius: 5px;
  color: var(--cream); font-family: 'Outfit', sans-serif; font-size: .82rem;
  transition: var(--transition); resize: none;
}
.form-input:focus { outline: none; border-color: var(--fern); }
.char-count { font-size: .65rem; color: var(--stone); text-align: right; margin-top: 2px; }
.wp-meta { font-size: .7rem; color: var(--stone); font-family: 'Space Mono', monospace; margin-bottom: 6px; line-height: 1.6; }
.wp-meta span { color: var(--mist); }
.btn-enlarge {
  width: 100%; padding: 5px; background: rgba(74,124,53,.15); border: 1px solid var(--fern);
  border-radius: 5px; color: var(--sage); font-size: .75rem; cursor: pointer; font-family: 'Outfit', sans-serif;
}
.btn-enlarge:hover { background: var(--moss); color: var(--snow); }

/* STATS */
#stats-bar { padding: 8px 16px; border-top: 1px solid rgba(255,255,255,.06); background: rgba(0,0,0,.2); display: flex; gap: 16px; }
.stat { font-size: .7rem; color: var(--stone); }
.stat strong { color: var(--mist); font-family: 'Space Mono', monospace; }

/* MAP */
#map-container { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* LEAFLET POPUP */
.leaflet-popup-content-wrapper { background: var(--panel-bg) !important; border: 1px solid var(--fern) !important; border-radius: 10px !important; color: var(--cream) !important; box-shadow: 0 8px 32px rgba(0,0,0,.6) !important; }
.leaflet-popup-tip { background: var(--panel-bg) !important; }
.leaflet-popup-content { margin: 0 !important; }
.popup-inner { padding: 14px; min-width: 220px; }
.popup-name { font-weight: 600; font-size: .95rem; color: var(--sage); margin-bottom: 8px; }
.popup-img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 6px; margin-bottom: 8px; display: block; }
.popup-coords { font-family: 'Space Mono', monospace; font-size: .7rem; color: var(--stone); margin-bottom: 6px; line-height: 1.7; }
.popup-comment { font-size: .8rem; color: var(--mist); margin-bottom: 8px; line-height: 1.5; }
.popup-enlarge { width: 100%; padding: 6px; border-radius: 5px; background: rgba(74,124,53,.2); border: 1px solid var(--fern); color: var(--sage); font-size: .78rem; cursor: pointer; }
.popup-enlarge:hover { background: var(--moss); color: white; }

/* MODAL */
#modal-overlay { position: fixed; inset: 0; z-index: 9000; background: rgba(0,0,0,.85); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; }
#modal-overlay.open { display: flex; }
#modal-img { max-width: 92vw; max-height: 88vh; border-radius: 8px; }
#modal-close { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,.15); border: none; color: white; font-size: 1.2rem; cursor: pointer; }

/* TOASTS */
#toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 10px 16px; border-radius: var(--radius); font-size: .82rem; background: var(--forest); border: 1px solid var(--fern); color: var(--cream); animation: slideIn .25s ease; max-width: 320px; }
.toast.error { background: #2a0d04; border-color: var(--alert); }
.toast.success { background: #0d2a0a; border-color: var(--sage); }
@keyframes slideIn { from { transform: translateX(60px); opacity:0; } to { transform: translateX(0); opacity:1; } }
</style>
</head>
<body>

<header id="header">
  <div id="logo">
    <svg viewBox="0 0 30 30" width="28" height="28" fill="none">
      <path d="M15 2L27 26H3L15 2Z" stroke="#4a7c35" stroke-width="1.5"/>
      <path d="M15 8L22 22H8L15 8Z" fill="#2d5a1b"/>
      <circle cx="15" cy="15" r="2" fill="#7aad5a"/>
    </svg>
    marando
  </div>
  <div id="tab-bar">
    <button class="tab-btn active" onclick="switchPanel('editor-panel')">🗺 Édition</button>
    <button class="tab-btn" onclick="switchPanel('deploy-panel')">📦 Déploiement</button>
  </div>
</header>

<main id="app">

  <!-- VOLET ÉDITION -->
  <div id="editor-panel" class="panel active">
    <div id="sidebar">
      <div id="sidebar-header">
        <h3>Fichier KMZ</h3>
        <div id="file-drop-zone" onclick="document.getElementById('kmz-input').click()">
          <input type="file" id="kmz-input" accept=".kmz,.kml" onchange="loadKMZ(this.files[0])">
          <div class="drop-icon">🗺️</div>
          <p>Glissez un fichier <strong>KMZ</strong> ou cliquez pour parcourir</p>
          <div id="file-name-display">Aucun fichier chargé</div>
        </div>
        <div id="map-controls" style="margin-top:10px;">
          <button class="map-btn active" onclick="setLayer('osm',this)">OSM</button>
          <button class="map-btn" onclick="setLayer('ign-plan',this)">IGN Plan</button>
          <button class="map-btn" onclick="setLayer('ign-ortho',this)">IGN Ortho</button>
        </div>
      </div>
      <div id="waypoints-list">
        <div style="text-align:center;padding:40px 16px;color:var(--stone);font-size:.82rem;">
          <div style="font-size:2rem;margin-bottom:8px;">🏔️</div>
          Chargez un fichier KMZ pour voir les waypoints
        </div>
      </div>
      <div id="stats-bar">
        <div class="stat">Waypoints : <strong id="stat-wp">0</strong></div>
        <div class="stat">Photos : <strong id="stat-photos">0</strong></div>
        <div class="stat">Distance : <strong id="stat-dist">—</strong></div>
      </div>
    </div>
    <div id="map-container">
      <div id="map"></div>
    </div>
  </div>

  <!-- VOLET DÉPLOIEMENT (placeholder) -->
  <div id="deploy-panel" class="panel" style="align-items:center;justify-content:center;color:var(--stone);">
    <div style="text-align:center;">
      <div style="font-size:3rem;margin-bottom:12px;">📦</div>
      <div>Volet déploiement — en cours de développement</div>
      <div style="margin-top:8px;font-size:.8rem;">Chargez d'abord un fichier KMZ dans l'éditeur</div>
    </div>
  </div>

</main>

<div id="modal-overlay" onclick="closeModal(event)">
  <button id="modal-close" onclick="closeModal()">✕</button>
  <img id="modal-img" src="" alt="">
</div>
<div id="toast-container"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>

// ── ÉTAT GLOBAL ──────────────────────────────────────
const state = {
  rawFileName: '',
  waypoints: [],
  trackCoords: [],
  mapLayer: 'osm',
  _photoMap: {},
};

// ── CARTE ────────────────────────────────────────────
const map = L.map('map').setView([46.5, 2.5], 6);
const layers = {
  osm:        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
                { attribution: '© OpenStreetMap', maxZoom: 19 }),
  'ign-plan': L.tileLayer('https://data.geopf.fr/wmts?layer=GEOGRAPHICALGRIDSYSTEMS.PLANIGNV2&style=normal&tilematrixset=PM&Service=WMTS&Request=GetTile&Version=1.0.0&Format=image%2Fpng&TileMatrix={z}&TileCol={x}&TileRow={y}',
                { attribution: '© IGN', maxZoom: 19 }),
  'ign-ortho':L.tileLayer('https://data.geopf.fr/wmts?layer=ORTHOIMAGERY.ORTHOPHOTOS&style=normal&tilematrixset=PM&Service=WMTS&Request=GetTile&Version=1.0.0&Format=image%2Fjpeg&TileMatrix={z}&TileCol={x}&TileRow={y}',
                { attribution: '© IGN', maxZoom: 20 }),
};
layers.osm.addTo(map);

function setLayer(name, btn) {
  Object.values(layers).forEach(l => { if (map.hasLayer(l)) map.removeLayer(l); });
  layers[name].addTo(map);
  state.mapLayer = name;
  document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── DRAG & DROP ──────────────────────────────────────
const dropZone = document.getElementById('file-drop-zone');
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragenter', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', e => { dropZone.classList.remove('drag-over'); });
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) loadKMZ(f);
});

// ── CHARGEMENT KMZ ───────────────────────────────────
async function loadKMZ(file) {
  if (!file) return;
  try {
    toast('Chargement de ' + file.name + '…');
    state.rawFileName = file.name.replace(/\.(kmz|kml)$/i, '');
    document.getElementById('file-name-display').textContent = file.name;
    state._photoMap = {};
    let kmlText;

    if (file.name.toLowerCase().endsWith('.kmz')) {
      const zip = await JSZip.loadAsync(file);
      const kmlEntry = Object.values(zip.files).find(e => e.name.toLowerCase().endsWith('.kml'));
      if (!kmlEntry) throw new Error('Aucun fichier KML dans le KMZ');
      kmlText = await kmlEntry.async('string');
      const photoPromises = [];
      zip.forEach((path, entry) => {
        if (!entry.dir && /\.(jpg|jpeg|png|webp|gif)$/i.test(path)) {
          photoPromises.push(entry.async('blob').then(blob => ({ name: path.split('/').pop(), blob })));
        }
      });
      (await Promise.all(photoPromises)).forEach(p => { state._photoMap[p.name] = p.blob; });
    } else {
      kmlText = await file.text();
    }

    parseKML(kmlText);
    toast(state.waypoints.length + ' waypoints chargés ✓', 'success');
  } catch (err) {
    toast('Erreur : ' + err.message, 'error');
    console.error(err);
  }
}

// ── PARSEUR KML ──────────────────────────────────────
function parseKML(txt) {
  const doc = new DOMParser().parseFromString(txt, 'application/xml');
  state.waypoints = [];
  state.trackCoords = [];
  map.eachLayer(l => { if (l._isWp || l._isTrack) map.removeLayer(l); });

  // Tracé
  doc.querySelectorAll('LineString coordinates').forEach(cs => {
    state.trackCoords.push(...parseCoords(cs.textContent));
  });

  if (state.trackCoords.length > 1) {
    const pl = L.polyline(state.trackCoords.map(c => [c[0],c[1]]), { color:'#7aad5a', weight:3, opacity:.85 });
    pl._isTrack = true;
    pl.addTo(map);
    map.fitBounds(pl.getBounds(), { padding:[40,40] });
  }

  // Waypoints
  let idx = 0;
  doc.querySelectorAll('Placemark').forEach(pm => {
    const pt = pm.querySelector('Point');
    if (!pt) return;
    const coordEl = pt.querySelector('coordinates');
    if (!coordEl) return;
    const coords = parseCoords(coordEl.textContent);
    if (!coords.length) return;
    const [lat, lon, alt] = coords[0];
    const name = pm.querySelector('name')?.textContent.trim() || ('Waypoint ' + (idx+1));
    const desc = pm.querySelector('description')?.textContent || '';
    const imgMatch = desc.match(/src=["']?([^"'\s>]+\.(jpg|jpeg|png|webp|gif))/i);
    const photoName = imgMatch ? imgMatch[1].split('/').pop() : null;
    state.waypoints.push({
      id: idx++, name, lat, lon, alt: alt||0, comment: '',
      photoName: photoName||null,
      photoBlob: (photoName && state._photoMap[photoName]) ? state._photoMap[photoName] : null,
      photoOptimized: null, marker: null, _optimizedFname: null,
    });
  });

  state.waypoints.forEach(addMarker);
  renderList();
  updateStats();
}

function parseCoords(str) {
  return str.trim().split(/\s+/).map(s => {
    const p = s.split(',');
    return p.length >= 2 ? [+p[1], +p[0], +(p[2]||0)] : null;
  }).filter(Boolean);
}

// ── MARQUEURS ────────────────────────────────────────
function addMarker(wp) {
  const p = !!wp.photoBlob;
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:32px;height:32px;border-radius:50% 50% 50% 0;background:${p?'#5c3d1e':'#2d5a1b'};border:2px solid ${p?'#c87040':'#7aad5a'};display:flex;align-items:center;justify-content:center;font-size:14px;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,.5)"><span style="transform:rotate(45deg)">${p?'📷':'📍'}</span></div>`,
    iconSize:[32,32], iconAnchor:[16,32], popupAnchor:[0,-34],
  });
  const m = L.marker([wp.lat, wp.lon], { icon });
  m._isWp = true;
  m.on('click', () => { openPopup(wp); selectCard(wp.id); });
  m.addTo(map);
  wp.marker = m;
}

function openPopup(wp) {
  if (!wp.marker) return;
  let imgHtml = '';
  if (wp.photoBlob) {
    const src = URL.createObjectURL(wp.photoOptimized || wp.photoBlob);
    imgHtml = `<img class="popup-img" src="${src}"><button class="popup-enlarge" onclick="openModal('${src}')">🔍 Agrandir</button>`;
  }
  wp.marker.bindPopup(L.popup({ maxWidth:320 }).setContent(`
    <div class="popup-inner">
      <div class="popup-name">${esc(wp.name)}</div>
      ${imgHtml}
      <div class="popup-coords">🌐 ${wp.lat.toFixed(6)}, ${wp.lon.toFixed(6)}<br>⛰️ ${Math.round(wp.alt)} m</div>
      ${wp.comment ? `<div class="popup-comment">💬 ${esc(wp.comment)}</div>` : ''}
    </div>`)).openPopup();
}

// ── LISTE WAYPOINTS ───────────────────────────────────
function renderList() {
  const list = document.getElementById('waypoints-list');
  if (!state.waypoints.length) {
    list.innerHTML = '<div style="text-align:center;padding:40px 16px;color:var(--stone);">Aucun waypoint trouvé</div>';
    return;
  }
  list.innerHTML = state.waypoints.map(wp => `
    <div class="wp-card" id="wpc-${wp.id}">
      <div class="wp-card-header" onclick="toggleCard(${wp.id})">
        <div class="wp-icon ${wp.photoBlob?'has-photo':''}">${wp.photoBlob?'📷':'📍'}</div>
        <div class="wp-info">
          <div class="wp-name-display">${esc(wp.name)}</div>
          <div class="wp-coords">${wp.lat.toFixed(4)}, ${wp.lon.toFixed(4)}</div>
        </div>
        <span style="color:var(--stone)">▼</span>
      </div>
      <div class="wp-card-body">
        ${wp.photoBlob ? `<img class="wp-thumb" id="thumb-${wp.id}" alt=""><button class="btn-enlarge" id="enl-${wp.id}">🔍 Agrandir</button>` : ''}
        <div class="form-group">
          <label class="form-label">Nom (40 car. max)</label>
          <input class="form-input" type="text" id="name-${wp.id}" value="${esc(wp.name)}" maxlength="40"
            oninput="updateName(${wp.id},this.value)">
          <div class="char-count" id="nc-${wp.id}">${wp.name.length}/40</div>
        </div>
        <div class="form-group">
          <label class="form-label">Commentaire (500 car. max)</label>
          <textarea class="form-input" id="cmt-${wp.id}" rows="3" maxlength="500"
            oninput="updateComment(${wp.id},this.value)">${esc(wp.comment)}</textarea>
          <div class="char-count" id="cc-${wp.id}">${wp.comment.length}/500</div>
        </div>
        <div class="wp-meta">🌐 <span>${wp.lat.toFixed(6)}, ${wp.lon.toFixed(6)}</span><br>⛰️ <span>${Math.round(wp.alt)} m</span></div>
      </div>
    </div>`).join('');

  state.waypoints.forEach(wp => { if (wp.photoBlob) loadThumb(wp); });
}

function toggleCard(id) {
  const card = document.getElementById('wpc-'+id);
  const opening = !card.classList.contains('expanded');
  card.classList.toggle('expanded');
  if (opening) {
    const wp = state.waypoints.find(w => w.id===id);
    if (wp) { map.panTo([wp.lat,wp.lon]); selectCard(id); openPopup(wp); }
  }
}

function selectCard(id) {
  document.querySelectorAll('.wp-card').forEach(c => c.classList.remove('selected'));
  const c = document.getElementById('wpc-'+id);
  if (c) { c.classList.add('selected'); c.scrollIntoView({behavior:'smooth',block:'nearest'}); }
}

function updateName(id, val) {
  const wp = state.waypoints.find(w=>w.id===id);
  if (!wp) return;
  wp.name = val.slice(0,40);
  document.getElementById('nc-'+id).textContent = wp.name.length+'/40';
  document.querySelector('#wpc-'+id+' .wp-name-display').textContent = wp.name;
}

function updateComment(id, val) {
  const wp = state.waypoints.find(w=>w.id===id);
  if (!wp) return;
  wp.comment = val.slice(0,500);
  document.getElementById('cc-'+id).textContent = wp.comment.length+'/500';
}

async function loadThumb(wp) {
  if (!wp.photoOptimized) wp.photoOptimized = await optimizePhoto(wp.photoBlob);
  const img = document.getElementById('thumb-'+wp.id);
  if (img) img.src = URL.createObjectURL(wp.photoOptimized);
  const btn = document.getElementById('enl-'+wp.id);
  if (btn) btn.onclick = () => openModal(URL.createObjectURL(wp.photoOptimized));
}

// ── OPTIMISATION PHOTO ────────────────────────────────
async function optimizePhoto(blob, maxBytes=500000) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const canvas = document.createElement('canvas');
      let {width:w, height:h} = img;
      const max = 1600;
      if (w>max||h>max) { const r=Math.min(max/w,max/h); w=Math.round(w*r); h=Math.round(h*r); }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      let q = 0.85;
      const attempt = () => {
        canvas.toBlob(out => {
          if (!out || out.size<=maxBytes || q<=0.3) { resolve(out||blob); return; }
          q -= 0.1; attempt();
        }, 'image/jpeg', q);
      };
      attempt();
    };
    img.onerror = () => resolve(blob);
    img.src = url;
  });
}

// ── STATS ────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-wp').textContent = state.waypoints.length;
  document.getElementById('stat-photos').textContent = state.waypoints.filter(w=>w.photoBlob).length;
  let d=0;
  for (let i=1;i<state.trackCoords.length;i++) {
    const [la1,lo1]= state.trackCoords[i-1], [la2,lo2]=state.trackCoords[i];
    const R=6371000,r=Math.PI/180,dLa=(la2-la1)*r,dLo=(lo2-lo1)*r;
    const a=Math.sin(dLa/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dLo/2)**2;
    d+=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  }
  document.getElementById('stat-dist').textContent = d>0 ? (d/1000).toFixed(1)+' km' : '—';
}

// ── NAVIGATION ───────────────────────────────────────
function switchPanel(id) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(id==='editor-panel'?'Édition':'Déploiement')));
  if (id==='editor-panel') setTimeout(()=>map.invalidateSize(),100);
}

// ── MODAL ────────────────────────────────────────────
function openModal(src) {
  document.getElementById('modal-img').src = src;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target===document.getElementById('modal-overlay') || e.target===document.getElementById('modal-close'))
    document.getElementById('modal-overlay').classList.remove('open');
}

// ── UTILS ────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function sanitize(s) { return String(s).replace(/[^a-zA-Z0-9_-]/g,'_').toLowerCase(); }
function toast(msg, type='') {
  const el = document.createElement('div');
  el.className = 'toast' + (type?' '+type:'');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
